<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PlanoV - Agendar Serviço</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --verde:        #3a5f1e;
  --verde-btn:    #2d5016;
  --laranja:      #e07a1c;
  --laranja-mid:  #f0a050;
  --bg:           #f7f4ee;
  --branco:       #ffffff;
  --texto:        #1a1a1a;
  --muted:        #888;
  --borda:        #dedad2;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #cdc8bc;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}

.frame {
  width: 390px;
  background: var(--bg);
  border-radius: 44px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── HEADER ── */
.header {
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.header-bg {
  position: absolute; inset: 0;
  background-image: url('img/superior.png');
  background-size: cover;
  background-position: left;
}
.header-content {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 18px;
}
.btn-icon {
  background: none; border: none; cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon svg { width: 22px; height: 22px; stroke: #2d4f14; stroke-width: 2.5; stroke-linecap: round; fill: none; stroke-linejoin: round; }
.logo-wrap img {
  height: 38px;
  /* O src agora está diretamente na tag HTML, não no CSS */
}

/* ── FAIXA TÍTULO ── */
.title-bar {
  background: var(--verde);
  padding: 14px 20px;
  text-align: center;
  flex-shrink: 0;
}
.title-bar h1 {
  font-size: 18px; font-weight: 700; color: #fff;
  letter-spacing: 0.2px;
}

/* ── SCROLL BODY ── */
.body {
  flex: 1;
  overflow-y: auto;
  padding: 0 0 100px;
  scrollbar-width: none;
  position: relative;
}
.body::-webkit-scrollbar { display: none; }

/* ── CALENDÁRIO (semana única) ── */
.cal-card {
  margin: 16px 16px 0;
  background: var(--branco);
  border-radius: 16px;
  padding: 14px 12px 16px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.cal-btn {
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--texto); padding: 2px 6px;
}
.cal-month {
  font-size: 14px; font-weight: 600; color: var(--texto);
  border: 1px solid var(--borda); border-radius: 8px;
  padding: 4px 20px; background: #fff;
}
.week-days {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; margin-bottom: 6px;
}
.week-days span {
  font-size: 11px; font-weight: 500; color: var(--muted);
  padding: 2px 0;
}
.week-row {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
}
.wday {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 400; color: var(--texto);
  border-radius: 50%; cursor: pointer;
}
.wday.muted { color: #ccc; cursor: default; }
.wday.range {
  background: var(--laranja-mid); color: #fff;
  font-weight: 600; border-radius: 0;
}
.wday.range-start {
  background: var(--laranja); color: #fff;
  font-weight: 700; border-radius: 50% 0 0 50%;
}
.wday.range-end {
  background: var(--laranja); color: #fff;
  font-weight: 700; border-radius: 0 50% 50% 0;
}

/* ── FORM ── */
.form-body {
  padding: 20px 16px 0;
}

.field-group {
  margin-bottom: 16px;
}

.field-label {
  font-size: 13px; font-weight: 600; color: var(--texto);
  margin-bottom: 6px; display: block;
}

.field-row {
  display: flex; gap: 10px;
}

.input-wrap {
  flex: 1; position: relative;
}

.input-wrap input,
.input-wrap select,
textarea {
  width: 100%;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  color: var(--texto);
  background: var(--branco);
  border: 1px solid var(--borda);
  border-radius: 10px;
  padding: 10px 36px 10px 12px;
  outline: none;
  transition: border 0.15s;
}

.input-wrap input:focus,
.input-wrap select:focus,
textarea:focus {
  border-color: var(--verde);
}

.input-wrap .ico {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 16px; pointer-events: none; color: var(--muted);
}

input[type="text"].full,
input[type="text"].full-input {
  width: 100%;
  font-family: 'Poppins', sans-serif;
  font-size: 13px; color: var(--texto);
  background: var(--branco);
  border: 1px solid var(--borda);
  border-radius: 10px;
  padding: 10px 12px;
  outline: none;
  transition: border 0.15s;
}
input[type="text"].full-input:focus { border-color: var(--verde); }

/* Textarea com bg da fazenda (imagem inferior) */
.textarea-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}
.textarea-wrap .ta-bg {
  position: absolute; inset: 0;
  background-image: url('img/inferior.png');
  background-size: cover;
  background-position: center top;
  opacity: 0.35;
  pointer-events: none;
}
.textarea-wrap textarea {
  position: relative; z-index: 1;
  background: transparent;
  resize: vertical;
  min-height: 90px;
  padding: 10px 12px;
  border: 1px solid var(--borda);
  border-radius: 10px;
}

/* ── BOTÃO FIXO ── */
.btn-footer {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px 20px 28px;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
}
.btn-agendar {
  width: 100%;
  background: var(--verde-btn);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px; font-weight: 700;
  border: none; border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-agendar:hover { background: #3a6620; }
.btn-agendar:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="frame">

  <!-- HEADER -->
  <div class="header">
    <div class="header-bg"></div>
    <div class="header-content">
      <button class="btn-icon" aria-label="Voltar">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="logo-wrap">
        <img src="img/logo.png" alt="PlanoV">
      </div>
      <button class="btn-icon" aria-label="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- FAIXA TÍTULO -->
  <div class="title-bar">
    <h1>Agendar Serviço</h1>
  </div>

  <!-- BODY SCROLL -->
  <div class="body">

    <!-- Calendário semana única -->
    <div class="cal-card">
      <div class="cal-nav">
        <button class="cal-btn" id="prev">&#8249;</button>
        <div class="cal-month" id="cal-label">Setembro 2026</div>
        <button class="cal-btn" id="next">&#8250;</button>
      </div>
      <div class="week-days">
        <span>Su</span><span>Mo</span><span>Tu</span>
        <span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
      </div>
      <div class="week-row" id="week-row"></div>
    </div>

    <!-- Formulário -->
    <div class="form-body">

      <!-- Data de Início -->
      <div class="field-group">
        <label class="field-label">Data de Início</label>
        <div class="field-row">
          <div class="input-wrap">
            <input type="date" id="data-inicio" value="2026-09-07">
            <span class="ico">📅</span>
          </div>
          <div class="input-wrap">
            <input type="date" id="data-fim" value="2026-09-08">
            <span class="ico">📅</span>
          </div>
        </div>
      </div>

      <!-- Horário -->
      <div class="field-group">
        <label class="field-label">Horário</label>
        <div class="field-row">
          <div class="input-wrap">
            <input type="time" id="hora-inicio" value="07:00">
            <span class="ico">🕐</span>
          </div>
          <div class="input-wrap">
            <input type="time" id="hora-fim" value="17:00">
            <span class="ico">🕐</span>
          </div>
        </div>
      </div>

      <!-- Tipo de Serviço -->
      <div class="field-group">
        <label class="field-label">Tipo de Serviço</label>
        <input type="text" class="full-input" id="tipo-servico" placeholder="">
      </div>

      <!-- Descrição -->
      <div class="field-group">
        <label class="field-label">Descrição do Serviço (opcional)</label>
        <div class="textarea-wrap">
          <div class="ta-bg"></div>
          <textarea id="descricao" rows="4"></textarea>
        </div>
      </div>

    </div>

    <!-- Botão fixo -->
    <div class="btn-footer">
      <button class="btn-agendar" onclick="agendar()">Agendar Serviço</button>
    </div>

  </div><!-- /body -->

</div><!-- /frame -->

<script>
// ── Calendário de semana ──
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let weekOffset = 0;
const BASE_SUN = new Date(2026, 8, 6); // Domingo 6 Set 2026

function renderWeek() {
  const sun = new Date(BASE_SUN);
  sun.setDate(sun.getDate() + weekOffset * 7);

  const label = document.getElementById('cal-label');
  label.textContent = MONTHS_PT[sun.getMonth()] + ' ' + sun.getFullYear();

  const row = document.getElementById('week-row');
  row.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(sun);
    d.setDate(sun.getDate() + i);
    const day = d.getDate();

    const el = document.createElement('div');
    let cls = '';
    if (weekOffset === 0) {
      if (i === 3) cls = 'range-start';
      else if (i === 6) cls = 'range-end';
      else if (i > 3 && i < 6) cls = 'range';
    }
    el.className = 'wday' + (cls ? ' ' + cls : '');
    el.textContent = day;
    row.appendChild(el);
  }
}

document.getElementById('prev').addEventListener('click', () => { weekOffset--; renderWeek(); });
document.getElementById('next').addEventListener('click', () => { weekOffset++; renderWeek(); });

renderWeek();

function agendar() {
  const di = document.getElementById('data-inicio').value;
  const df = document.getElementById('data-fim').value;
  const hi = document.getElementById('hora-inicio').value;
  const hf = document.getElementById('hora-fim').value;
  const tipo = document.getElementById('tipo-servico').value.trim();
  const desc = document.getElementById('descricao').value.trim();

  if (!di || !df) { alert('Preencha as datas de início e fim.'); return; }
  if (!hi || !hf) { alert('Preencha os horários.'); return; }
  if (!tipo) { alert('Informe o tipo de serviço.'); return; }

  alert('Serviço agendado com sucesso!\n\nPeríodo: ' + di + ' a ' + df +
        '\nHorário: ' + hi + ' – ' + hf +
        '\nServiço: ' + tipo);
}
</script>
</body>
</html>
