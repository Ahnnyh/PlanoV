<html lang="pt-BR">

<meta charset="UTF-8">

<title>PlanoV - Agendar Serviço</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --verde:        #3a5f1e;
  --verde-btn:    #2d5016;
  --laranja:      #e07a1c;
  --laranja-mid:  #f0a050;
  --bg:           #f7f4ee;
  --branco:       #ffffff;
  --texto:        #1a1a1a;
  --muted:        #888;
  --borda:        #dedad2;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #cdc8bc;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}

.frame {
  width: 390px;
  background: var(--bg);
  border-radius: 44px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  position: relative;
}

.header-content {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 18px;
}
.btn-icon {
  background: none; border: none; cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon svg { width: 22px; height: 22px; stroke: #2d4f14; stroke-width: 2.5; stroke-linecap: round; fill: none; stroke-linejoin: round; }
.logo-wrap img { height: 38px; }

/* ── FAIXA TÍTULO ── */
.title-bar {
  background: var(--verde);
  padding: 14px 20px;
  text-align: center;
  flex-shrink: 0;
}
.title-bar h1 {
  font-size: 18px; font-weight: 700; color: #fff;
  letter-spacing: 0.2px;
}

/* ── SCROLL BODY ── */
.body {
  flex: 1;
  overflow-y: auto;
  padding: 0 0 100px;
  scrollbar-width: none;
  position: relative;
}
.body::-webkit-scrollbar { display: none; }

/* ── CALENDÁRIO (semana única) ── */
.cal-card {
  margin: 16px 16px 0;
  background: var(--branco);
  border-radius: 16px;
  padding: 14px 12px 16px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.cal-btn {
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--texto); padding: 2px 6px;
}
.cal-month {
  font-size: 14px; font-weight: 600; color: var(--texto);
  border: 1px solid var(--borda); border-radius: 8px;
  padding: 4px 20px; background: #fff;
}
.week-days {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; margin-bottom: 6px;
}
.week-days span {
  font-size: 11px; font-weight: 500; color: var(--muted);
  padding: 2px 0;
}
.week-row {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
}
.wday {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 400; color: var(--texto);
  border-radius: 50%; cursor: pointer;
}
.wday.muted { color: #ccc; cursor: default; }
.wday.range {
  background: var(--laranja-mid); color: #fff;
  font-weight: 600; border-radius: 0;
}
.wday.range-start {
  background: var(--laranja); color: #fff;
  font-weight: 700; border-radius: 50% 0 0 50%;
}
.wday.range-end {
  background: var(--laranja); color: #fff;
  font-weight: 700; border-radius: 0 50% 50% 0;
}

/* ── FORM ── */
.form-body {
  padding: 20px 16px 0;
}

.field-group {
  margin-bottom: 16px;
}

.field-label {
  font-size: 13px; font-weight: 600; color: var(--texto);
  margin-bottom: 6px; display: block;
}

.field-row {
  display: flex; gap: 10px;
}

.input-wrap {
  flex: 1; position: relative;
}

.input-wrap input,
.input-wrap select,
textarea {
  width: 100%;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  color: var(--texto);
  background: var(--branco);
  border: 1px solid var(--borda);
  border-radius: 10px;
  padding: 10px 36px 10px 12px;
  outline: none;
  transition: border 0.15s;
}

.input-wrap input:focus,
.input-wrap select:focus,
textarea:focus {
  border-color: var(--verde);
}

.input-wrap .ico {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 16px; pointer-events: none; color: var(--muted);
}

input[type="text"].full,
input[type="text"].full-input {
  width: 100%;
  font-family: 'Poppins', sans-serif;
  font-size: 13px; color: var(--texto);
  background: var(--branco);
  border: 1px solid var(--borda);
  border-radius: 10px;
  padding: 10px 12px;
  outline: none;
  transition: border 0.15s;
}
input[type="text"].full-input:focus { border-color: var(--verde); }

/* Textarea com bg da fazenda */
.textarea-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

            <input type="date" id="data-inicio" value="2026-09-07">
            <span class="ico">📅</span>
          </div>
          <div class="input-wrap">
            <input type="date" id="data-fim" value="2026-09-08">
            <span class="ico">📅</span>
          </div>
        </div>
      </div>

      <!-- Horário -->
      <div class="field-group">
        <label class="field-label">Horário</label>
        <div class="field-row">
          <div class="input-wrap">
            <input type="time" id="hora-inicio" value="07:00">
            <span class="ico">🕐</span>
          </div>
          <div class="input-wrap">
            <input type="time" id="hora-fim" value="17:00">
            <span class="ico">🕐</span>
          </div>
        </div>
      </div>

      <!-- Tipo de Serviço -->
      <div class="field-group">
        <label class="field-label">Tipo de Serviço</label>
        <input type="text" class="full-input" id="tipo-servico" placeholder="">
      </div>

      <!-- Descrição -->
      <div class="field-group">
        <label class="field-label">Descrição do Serviço (opcional)</label>
        <div class="textarea-wrap">
          <div class="ta-bg"></div>
          <textarea id="descricao" rows="4"></textarea>
        </div>
      </div>

    </div>

    <!-- Botão fixo -->
    <div class="btn-footer">
      <button class="btn-agendar" onclick="agendar()">Agendar Serviço</button>

<script>
// ── Calendário de semana ──
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// Semana de referência: 7-13 de Setembro de 2026
// weekOffset=0 = semana original
let weekOffset = 0;
const BASE_SUN = new Date(2026, 8, 6); // Domingo 6 Set 2026 (começo da semana 7-13)

// Range: dias 9 a 13 (índices 3-6 na semana, sendo dom=0)
// Na semana 6..12: 9=ter(3), 10=qua(4), 11=qui(5), 12=sex(6), 13=sab(7) → posições 3..6
function renderWeek() {
  const sun = new Date(BASE_SUN);
  sun.setDate(sun.getDate() + weekOffset * 7);

  const label = document.getElementById('cal-label');
  label.textContent = MONTHS_PT[sun.getMonth()] + ' ' + sun.getFullYear();

  const row = document.getElementById('week-row');
  row.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(sun);
    d.setDate(sun.getDate() + i);
    const day = d.getDate();

    const el = document.createElement('div');

    // Range original: só na semana base
    let cls = '';
    if (weekOffset === 0) {
      if (i === 3) cls = 'range-start';      // dia 9
      else if (i === 6) cls = 'range-end';   // dia 13
      else if (i > 3 && i < 6) cls = 'range'; // 10,11,12
    }
    el.className = 'wday' + (cls ? ' ' + cls : '');
    el.textContent = day;
    row.appendChild(el);
  }
}

document.getElementById('prev').addEventListener('click', () => { weekOffset--; renderWeek(); });
document.getElementById('next').addEventListener('click', () => { weekOffset++; renderWeek(); });

renderWeek();

// ── Agendar ──
function agendar() {
  const di = document.getElementById('data-inicio').value;
  const df = document.getElementById('data-fim').value;
  const hi = document.getElementById('hora-inicio').value;
  const hf = document.getElementById('hora-fim').value;
  const tipo = document.getElementById('tipo-servico').value.trim();
  const desc = document.getElementById('descricao').value.trim();

  if (!di || !df) { alert('Preencha as datas de início e fim.'); return; }
  if (!hi || !hf) { alert('Preencha os horários.'); return; }
  if (!tipo) { alert('Informe o tipo de serviço.'); return; }

  alert('Serviço agendado com sucesso!\n\nPeríodo: ' + di + ' a ' + df +
        '\nHorário: ' + hi + ' – ' + hf +
        '\nServiço: ' + tipo);
}
</script>
