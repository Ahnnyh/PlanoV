<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- METADADOS -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PlanoV – Redefinição de Senha</title>

  <!-- ESTILOS EXTERNOS -->
  <link rel="stylesheet" href="css/redefinir-senha.css" />
</head>
<body>

<!-- ===== CONTAINER PRINCIPAL (FRAME) ===== -->
<div class="frame">

  <!-- IMAGEM DE FUNDO AGRÍCOLA -->
  <div class="bg-image-wrap">
    <img src="IMG/fundo-trator.png" alt="" class="bg-image" />
  </div>

  <!-- ===== CONTEÚDO PRINCIPAL ===== -->
  <div class="content">

    <!-- BOTÃO VOLTAR -->
    <button class="back-btn" onclick="history.back()" title="Voltar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- LOGO -->
    <div class="logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="logo-img" />
    </div>

    <!-- ===== CARD DE REDEFINIÇÃO ===== -->
    <div class="card">
      <h2 class="card-title">Redefinição de<br/>senha</h2>

      <!-- CAMPO: NOVA SENHA -->
      <div class="field">
        <label for="nova-senha">Nova senha</label>
        <div class="input-wrap">
          <!-- Ícone de cadeado -->
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="nova-senha"
            placeholder="Digite sua nova senha..."
            autocomplete="new-password"
          />
          <!-- Botão olho (mostrar/ocultar senha) -->
          <button class="toggle-eye" data-target="nova-senha" title="Mostrar/ocultar senha">
            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Mensagem de erro para nova senha -->
        <span class="field-error" id="erro-nova"></span>
      </div>

      <!-- CAMPO: CONFIRMAR SENHA -->
      <div class="field">
        <label for="confirma-senha">Confirme a senha</label>
        <div class="input-wrap">
          <!-- Ícone de cadeado -->
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="confirma-senha"
            placeholder="Digite sua senha..."
            autocomplete="new-password"
          />
          <!-- Botão olho (mostrar/ocultar senha) -->
          <button class="toggle-eye" data-target="confirma-senha" title="Mostrar/ocultar senha">
            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Mensagem de erro para confirmação de senha -->
        <span class="field-error" id="erro-confirma"></span>
      </div>

      <!-- BOTÃO CONFIRMAR -->
      <button class="btn-confirmar" id="btn-confirmar">Confirmar</button>
    </div>

  </div> <!-- /.content -->

</div> <!-- /.frame -->

<!-- ===== MODAL DE SUCESSO (POPUP PERSONALIZADO) ===== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">

    <div class="modal-logo-wrap">
      <img src="IMG/logo.png"
           alt="PlanoV Logo"
           class="modal-logo-img" />
    </div>

    <p class="modal-text">
      Sua senha foi<br>
      redefinida com<br>
      sucesso!<br><br>
      Agora você já pode<br>
      acessar sua conta.
    </p>

    <button class="modal-btn-fechar"
            id="modal-btn-fechar">
      Ir para login
    </button>

  </div>
</div>

<!-- ===== SCRIPT EXTERNO ===== -->
<script src="Javascripct/redefinir-senha.js"></script>

</body>
</html>
