<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PlanoV – Redefinição de Senha</title>
  <link rel="stylesheet" href="css/redefinir-senha.css" />
</head>
<body>

<div class="frame">
  <div class="bg-image-wrap">
    <img src="IMG/fundo-trator.png" alt="" class="bg-image" />
  </div>

  <div class="content">
    <button class="back-btn" onclick="history.back()" title="Voltar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="logo-img" />
    </div>

    <div class="card">
      <h2 class="card-title">Redefinição de<br/>senha</h2>

      <div class="field">
        <label for="nova-senha">Nova senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="nova-senha" placeholder="Digite sua nova senha..." autocomplete="new-password" />
          <button class="toggle-eye" data-target="nova-senha" title="Mostrar/ocultar senha">
            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="erro-nova"></span>
      </div>

      <div class="field">
        <label for="confirma-senha">Confirme a senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="confirma-senha" placeholder="Confirme sua nova senha..." autocomplete="new-password" />
          <button class="toggle-eye" data-target="confirma-senha" title="Mostrar/ocultar senha">
            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="erro-confirma"></span>
      </div>

      <button class="btn-confirmar" id="btn-confirmar">Confirmar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="modal-logo-img" />
    </div>
    <p class="modal-text">
      Sua senha foi<br>
      redefinida com<br>
      sucesso!<br><br>
      Agora você já pode<br>
      acessar sua conta.
    </p>
    <button class="modal-btn-fechar" id="modal-btn-fechar">Ir para login</button>
  </div>
</div>

<script src="Javascripct/redefinir-senha.js"></script>
</body>
</html>
