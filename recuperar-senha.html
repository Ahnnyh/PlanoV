<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PlanoV – Recuperar Senha</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/recuperar-senha.css" />
</head>
<body>

<div class="frame">
  <div class="bg-image-wrap">
    <img src="IMG/fundo-trator.png" alt="" class="bg-image" />
  </div>

  <div class="content">
    <button class="back-btn" onclick="history.back()" title="Voltar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="logo-img" />
    </div>

    <div class="card">
      <h2 class="card-title">Recuperar senha</h2>

      <div class="field">
        <label for="email">Confirme seu email de cadastro:</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" placeholder="Digite seu email..." autocomplete="email" />
        </div>
      </div>

      <p class="helper-text">Enviaremos um email para<br/>redefinição de senha.</p>
      <button class="btn-send" id="btn-send">Enviar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="modal-logo-img" />
    </div>
    <p class="modal-text">
      Te enviamos um email<br>
      para redefinição de<br>
      senha!<br><br>
      Confira seu email e<br>
      caixa de spam.
    </p>
    <button class="modal-btn-fechar" id="modal-btn-fechar">OK, entendi</button>
  </div>
</div>

<script src="Javascripct/recuperar-senha.js"></script>
</body>
</html>
