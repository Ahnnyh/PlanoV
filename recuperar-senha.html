<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PlanoV – Recuperar Senha</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* TEMA CLARO (padrão) */
    :root {
      --bg-card: rgba(255, 255, 255, 0.95);
      --texto: #1a1a1a;
      --muted: #666;
      --borda: #e0ddd6;
      --input-bg: #fff;
      --btn-bg: #2d5016;
      --btn-hover: #3a6620;
      --modal-bg: #ffffff;
      --overlay-bg: rgba(0, 0, 0, 0.6);
      --placeholder: #999;
    }

    /* TEMA ESCURO */
    body.dark-theme {
      --bg-card: #1e1e1e;
      --texto: #e0e0e0;
      --muted: #aaa;
      --borda: #333;
      --input-bg: #2a2a2a;
      --btn-bg: #4a7020;
      --btn-hover: #5a8530;
      --modal-bg: #1e1e1e;
      --overlay-bg: rgba(0, 0, 0, 0.8);
      --placeholder: #888;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #cdc8bc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.2s, color 0.2s;
    }
    body.dark-theme {
      background: #0a0a0a;
    }

    .frame {
      width: 100%;
      max-width: 450px;
      min-height: 780px;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      margin: 0 auto;
      background: #000;
    }

    .bg-image-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      padding: 60px 24px 40px;
    }

    .back-btn {
      background: rgba(0, 0, 0, 0.4);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    .back-btn:active {
      background: rgba(0, 0, 0, 0.6);
    }
    .back-btn svg {
      stroke: white;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-img {
      height: 60px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--texto);
      text-align: center;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 24px;
    }
    .field label {
      font-size: 14px;
      font-weight: 500;
      color: var(--texto);
      display: block;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 0 16px;
      transition: border 0.2s;
    }
    .input-wrap:focus-within {
      border-color: #e07a1c;
    }
    .input-icon {
      stroke: var(--muted);
      margin-right: 12px;
      flex-shrink: 0;
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      padding: 16px 0;
      color: var(--texto);
    }
    .input-wrap input::placeholder {
      color: var(--placeholder);
    }

    .helper-text {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin: 16px 0 24px;
      line-height: 1.5;
    }

    .btn-send {
      width: 100%;
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-send:active {
      transform: scale(0.98);
    }
    .btn-send:hover {
      background: var(--btn-hover);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay-bg);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: var(--modal-bg);
      border-radius: 32px;
      width: 85%;
      max-width: 300px;
      padding: 32px 24px 28px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--borda);
    }
    .modal-logo-img {
      height: 50px;
      margin-bottom: 20px;
    }
    .modal-text {
      font-size: 14px;
      color: var(--texto);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .modal-btn-fechar {
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    .modal-btn-fechar:active {
      transform: scale(0.98);
    }

    @media (max-width: 400px) {
      .content {
        padding: 50px 16px 30px;
      }
      .card {
        padding: 24px 20px;
      }
      .card-title {
        font-size: 22px;
      }
      .input-wrap input {
        font-size: 15px;
        padding: 14px 0;
      }
      .btn-send {
        font-size: 15px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="bg-image-wrap">
    <img src="IMG/fundo-trator.png" alt="" class="bg-image" />
  </div>

  <div class="content">
    <button class="back-btn" onclick="history.back()" title="Voltar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="logo-img" />
    </div>

    <div class="card">
      <h2 class="card-title">Recuperar senha</h2>

      <div class="field">
        <label for="email">Confirme seu email de cadastro:</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" placeholder="Digite seu email..." autocomplete="email" />
        </div>
      </div>

      <p class="helper-text">Enviaremos um email para<br/>redefinição de senha.</p>
      <button class="btn-send" id="btn-send">Enviar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-logo-wrap">
      <img src="IMG/logo.png" alt="PlanoV Logo" class="modal-logo-img" />
    </div>
    <p class="modal-text">
      Te enviamos um email<br>
      para redefinição de<br>
      senha!<br><br>
      Confira seu email e<br>
      caixa de spam.
    </p>
    <button class="modal-btn-fechar" id="modal-btn-fechar">OK, entendi</button>
  </div>
</div>

<script>
  // ========== APLICA TEMA ESCURO SALVO ==========
  const savedDarkMode = localStorage.getItem('darkMode') === 'true';
  if (savedDarkMode) {
    document.body.classList.add('dark-theme');
  }

  // O restante da lógica (envio, modal) está no arquivo externo Javascripct/recuperar-senha.js
</script>
<script src="Javascripct/recuperar-senha.js"></script>
</body>
</html>
