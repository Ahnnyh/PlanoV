<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PlanoV – Redefinição de Senha</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* TEMA CLARO (padrão) */
    :root {
      --bg-card: rgba(255, 255, 255, 0.95);
      --texto: #1a1a1a;
      --muted: #666;
      --borda: #e0ddd6;
      --input-bg: #fff;
      --btn-bg: #2d5016;
      --btn-hover: #3a6620;
      --modal-bg: #ffffff;
      --overlay-bg: rgba(0, 0, 0, 0.6);
      --placeholder: #999;
      --error: #c0392b;
    }

    /* TEMA ESCURO */
    body.dark-theme {
      --bg-card: #1e1e1e;
      --texto: #e0e0e0;
      --muted: #aaa;
      --borda: #333;
      --input-bg: #2a2a2a;
      --btn-bg: #4a7020;
      --btn-hover: #5a8530;
      --modal-bg: #1e1e1e;
      --overlay-bg: rgba(0, 0, 0, 0.8);
      --placeholder: #888;
      --error: #e74c3c;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #cdc8bc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      transition: background 0.2s, color 0.2s;
    }

    body.dark-theme {
      background: #0a0a0a;
    }

    .frame {
      width: 100%;
      max-width: 480px;
      background: #000;
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Imagem de fundo */
    .bg-image-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Conteúdo */
    .content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
    }

    .back-btn {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s, transform 0.1s;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .back-btn:active {
      background: rgba(0, 0, 0, 0.7);
      transform: scale(0.96);
    }
    .back-btn svg {
      stroke: white;
      width: 22px;
      height: 22px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
      flex-shrink: 0;
    }
    .logo-img {
      height: 80px;
      width: auto;
      max-width: 250px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 32px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
    }

    .card-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--texto);
      text-align: center;
      margin-bottom: 1.75rem;
      line-height: 1.3;
    }

    .field {
      margin-bottom: 1.25rem;
    }
    .field label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--texto);
      display: block;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 0 16px;
      transition: border 0.2s;
    }
    .input-wrap:focus-within {
      border-color: #e07a1c;
    }
    .input-icon {
      stroke: var(--muted);
      margin-right: 12px;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      padding: 16px 0;
      color: var(--texto);
    }
    .input-wrap input::placeholder {
      color: var(--placeholder);
    }
    .toggle-eye {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      margin-left: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      border-radius: 50%;
    }
    .toggle-eye:active {
      background: rgba(0,0,0,0.05);
    }
    .eye-icon {
      stroke: var(--muted);
      width: 18px;
      height: 18px;
    }
    .field-error {
      font-size: 0.75rem;
      color: var(--error);
      display: block;
      margin-top: 6px;
      padding-left: 12px;
    }

    .btn-confirmar {
      width: 100%;
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 60px;
      padding: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      touch-action: manipulation;
    }
    .btn-confirmar:active {
      transform: scale(0.98);
      background: var(--btn-hover);
    }
    .btn-confirmar:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay-bg);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: var(--modal-bg);
      border-radius: 32px;
      width: 85%;
      max-width: 300px;
      padding: 32px 24px 28px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--borda);
      margin: 16px;
    }
    .modal-logo-img {
      height: 50px;
      width: auto;
      margin-bottom: 20px;
    }
    .modal-text {
      font-size: 0.875rem;
      color: var(--texto);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .modal-btn-fechar {
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 60px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      width: 100%;
      touch-action: manipulation;
    }
    .modal-btn-fechar:active {
      transform: scale(0.98);
    }

    /* Responsividade */
    @media (max-width: 400px) {
      .content {
        padding: calc(env(safe-area-inset-top, 16px) + 16px) 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
      }
      .card {
        padding: 24px 20px;
      }
      .card-title {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .input-wrap input {
        font-size: 0.9375rem;
        padding: 14px 0;
      }
      .btn-confirmar {
        font-size: 0.9375rem;
        padding: 12px;
      }
      .back-btn {
        width: 40px;
        height: 40px;
        margin-bottom: 16px;
      }
      .back-btn svg {
        width: 20px;
        height: 20px;
      }
      .logo-img {
        height: 36px;
      }
      .toggle-eye {
        padding: 6px;
      }
    }

    input, button {
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="bg-image-wrap">
    <img src="img/fundo_Splash-Screen.png" alt="Fundo" class="bg-image" />
  </div>

  <div class="content">
    <button class="back-btn" onclick="history.back()" title="Voltar" aria-label="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="logo-wrap">
      <img src="img/logo.png" alt="PlanoV Logo" class="logo-img" />
    </div>

    <div class="card">
      <h2 class="card-title">Redefinição de<br/>senha</h2>

      <div class="field">
        <label for="nova-senha">Nova senha</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="nova-senha" placeholder="Digite sua nova senha..." autocomplete="new-password" />
          <button class="toggle-eye" data-target="nova-senha" type="button" aria-label="Mostrar/ocultar senha">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="erro-nova"></span>
      </div>

      <div class="field">
        <label for="confirma-senha">Confirme a senha</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="confirma-senha" placeholder="Confirme sua nova senha..." autocomplete="new-password" />
          <button class="toggle-eye" data-target="confirma-senha" type="button" aria-label="Mostrar/ocultar senha">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="erro-confirma"></span>
      </div>

      <button class="btn-confirmar" id="btn-confirmar">Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL DE SUCESSO -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <img src="img/logo.png" alt="PlanoV Logo" class="modal-logo-img" />
    <p class="modal-text">
      Sua senha foi<br>
      redefinida com<br>
      sucesso!<br><br>
      Agora você já pode<br>
      acessar sua conta.
    </p>
    <button class="modal-btn-fechar" id="modal-btn-fechar">Ir para login</button>
  </div>
</div>

<script>
  // ========== APLICA TEMA ESCURO SALVO ==========
  const savedDarkMode = localStorage.getItem('darkMode') === 'true';
  if (savedDarkMode) {
    document.body.classList.add('dark-theme');
  }

  // ========== LÓGICA DE REDEFINIÇÃO DE SENHA ==========
  const API_BASE_URL = 'https://planov.onrender.com/api';

  // Pega o token da URL (query param ?token=...)
  const urlParams = new URLSearchParams(window.location.search);
  const resetToken = urlParams.get('token');

  const novaSenhaInput = document.getElementById('nova-senha');
  const confirmaSenhaInput = document.getElementById('confirma-senha');
  const btnConfirmar = document.getElementById('btn-confirmar');
  const modal = document.getElementById('modal-overlay');
  const modalBtn = document.getElementById('modal-btn-fechar');
  const erroNova = document.getElementById('erro-nova');
  const erroConfirma = document.getElementById('erro-confirma');

  // Toggle eye
  document.querySelectorAll('.toggle-eye').forEach(btn => {
    btn.addEventListener('click', function() {
      const targetId = this.getAttribute('data-target');
      const input = document.getElementById(targetId);
      if (input) {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
      }
    });
  });

  function showModal() {
    if (modal) modal.classList.add('show');
  }

  function hideModalAndRedirect() {
    if (modal) modal.classList.remove('show');
    window.location.href = 'login.html';
  }

  if (modalBtn) {
    modalBtn.addEventListener('click', hideModalAndRedirect);
  }
  if (modal) {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) hideModalAndRedirect();
    });
  }

async function resetPassword() {
  const nova = novaSenhaInput.value.trim();
  const confirma = confirmaSenhaInput.value.trim();

  erroNova.innerText = '';
  erroConfirma.innerText = '';

  if (!nova || nova.length < 6) {
    erroNova.innerText = 'A senha deve ter pelo menos 6 caracteres';
    return;
  }
  if (!confirma || nova !== confirma) {
    erroConfirma.innerText = 'As senhas não coincidem';
    return;
  }
  if (!resetToken) {
    alert('Token não encontrado. Solicite nova recuperação.');
    return;
  }

  btnConfirmar.disabled = true;
  btnConfirmar.textContent = 'Redefinindo...';

  try {
    const response = await fetch('https://planov.onrender.com/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, novaSenha: nova })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Erro ao redefinir senha');

    showModal();
  } catch (err) {
    alert(err.message);
  } finally {
    btnConfirmar.disabled = false;
    btnConfirmar.textContent = 'Confirmar';
  }
}

  if (btnConfirmar) {
    btnConfirmar.addEventListener('click', resetPassword);
  }
</script>
</body>
</html>
