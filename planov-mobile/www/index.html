<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PlanoV</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #3a5f1e;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    /* Container da splash screen */
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: url('img/fundo_Splash-Screen.png') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeOut 0.6s ease-in-out 2.5s forwards;
      /* Garantir que o fundo cubra toda a tela mesmo se a imagem demorar */
      background-color: #3a5f1e;
    }

    /* Logo centralizada */
    .logo {
      width: 200px;
      max-width: 50vw;
      height: auto;
      animation: pulse 1.5s infinite alternate;
    }

    /* Animação de pulsação para a logo */
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* Animação de fade out (sumir a splash) */
    @keyframes fadeOut {
      0% { opacity: 1; visibility: visible; }
      99% { opacity: 0; visibility: visible; }
      100% { opacity: 0; visibility: hidden; display: none; }
    }

    /* Responsividade: ajusta o tamanho da logo em telas muito pequenas */
    @media (max-width: 480px) {
      .logo {
        width: 140px;
      }
    }

    @media (max-width: 360px) {
      .logo {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img src="img/Plano_V.png" alt="PlanoV" class="logo">
  </div>

  <script>
    // Tempo total até o redirecionamento (deve ser maior que a duração da animação)
    const SPLASH_DURATION = 3200; // 3.2 segundos para garantir que o fade termine

    // Função para redirecionar
    function redirect() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');

      if (token && user.id) {
        window.location.href = 'home.html';
      } else {
        window.location.href = 'boas-vindas.html';
      }
    }

    // Aguarda o tempo da splash e redireciona
    setTimeout(redirect, SPLASH_DURATION);

    // Fallback: se a página demorar a carregar, redireciona após 5 segundos
    setTimeout(redirect, 5000);
  </script>
</body>
</html>
