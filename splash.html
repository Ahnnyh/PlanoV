<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PlanoV</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #3a5f1e; /* fallback caso a imagem não carregue */
      overflow: hidden;
    }

    /* Container da splash screen */
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: url('img/fundo_Splash-Screen.png') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeOut 0.5s ease-in-out 2.5s forwards;
    }

    /* Logo centralizada */
    .logo {
      width: 200px;
      max-width: 50vw;
      height: auto;
      animation: pulse 1.5s infinite alternate;
    }

    /* Animação de pulsação para a logo */
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* Animação de fade out (sumir a splash) */
    @keyframes fadeOut {
      0% { opacity: 1; visibility: visible; }
      99% { opacity: 0; visibility: visible; }
      100% { opacity: 0; visibility: hidden; display: none; }
    }

    /* Responsividade: ajusta o tamanho da logo em telas muito pequenas */
    @media (max-width: 480px) {
      .logo {
        width: 120px;
      }
    }

    @media (max-width: 360px) {
      .logo {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <img src="img/Plano_V.png" alt="PlanoV" class="logo">
  </div>

  <script>
    // Tempo de exibição da splash (deve coincidir com o animation-duration da fadeOut)
    // 2.5s + 0.5s de fade = 3s, mas para garantir usamos 3 segundos
    const SPLASH_DURATION = 3000; // 3 segundos

    setTimeout(() => {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');

      if (token && user.id) {
        window.location.href = 'home.html';
      } else {
        window.location.href = 'index.html';
      }
    }, SPLASH_DURATION);
  </script>
</body>
</html>
