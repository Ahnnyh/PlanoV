<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PlanoV - Perfil da Empresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --verde: #3a5f1e;
      --verde-btn: #2d5016;
      --verde-card: #4a7c28;
      --laranja: #e07a1c;
      --laranja-mid: #f0a050;
      --bg: #f7f4ee;
      --branco: #ffffff;
      --texto: #1a1a1a;
      --muted: #888;
      --borda: #e0ddd6;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #cdc8bc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .frame {
      width: 100%;
      max-width: 450px;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 700px;
      margin: 0 auto;
    }

    /* HEADER (igual ao meu_perfil.html) */
    .header {
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header-bg {
      position: absolute;
      inset: 0;
      background-image: url('img/superior.png');
      background-size: cover;
      background-position: left;
    }
    .header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 20px 18px;
    }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .btn-icon:active {
      background: rgba(0,0,0,0.05);
    }
    .btn-icon svg {
      width: 24px;
      height: 24px;
      stroke: #2d4f14;
      stroke-width: 2.5;
      stroke-linecap: round;
      fill: none;
      stroke-linejoin: round;
    }
    .logo-wrap img {
      height: 40px;
      content: url('img/logo.png');
    }

    .title-bar {
      background: var(--verde);
      padding: 14px 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .title-bar h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    /* Hero com avatar e badge */
    .perfil-hero {
      position: relative;
      background-image: url('img/inferior.png');
      background-size: cover;
      background-position: center 30%;
      padding-top: 24px;
      padding-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .perfil-hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--bg));
    }
    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #fff;
      overflow: hidden;
      background: #c8a96e;
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #8B6914, #c8a050);
    }
    .avatar-placeholder svg {
      width: 64px;
      height: 64px;
    }
    .badge-empresa {
      margin-top: 8px;
      background: var(--laranja);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 20px;
    }

    /* Conteúdo principal */
    .body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 0 16px 100px;
      background: var(--bg);
    }
    .body::-webkit-scrollbar {
      display: none;
    }

    /* Cards e seções */
    .card {
      background: var(--branco);
      border-radius: 14px;
      border: 1px solid var(--borda);
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--verde-card);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title svg {
      width: 18px;
      height: 18px;
      stroke: var(--verde-card);
      stroke-width: 2;
      fill: none;
    }
    .sobre-texto {
      font-size: 13px;
      color: var(--texto);
      line-height: 1.6;
    }
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .tag {
      background: #e8f0df;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--verde-card);
    }

    /* Bloco de avaliação média */
    .avaliacao-media {
      background: var(--branco);
      border-radius: 14px;
      border: 1px solid var(--borda);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .star-big {
      width: 24px;
      height: 24px;
      fill: var(--laranja);
    }
    .media-valor {
      font-size: 18px;
      font-weight: 700;
      color: var(--texto);
    }
    .media-label {
      font-size: 13px;
      color: var(--muted);
    }

    /* Lista de avaliações */
    .reviews-list {
      list-style: none;
      margin-top: 6px;
    }
    .review-item {
      background: var(--branco);
      border-radius: 14px;
      border: 1px solid var(--borda);
      padding: 12px;
      margin-bottom: 10px;
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .review-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--texto);
    }
    .stars {
      color: var(--laranja);
      letter-spacing: 2px;
      font-size: 13px;
    }
    .review-text {
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }

    /* Formulário de avaliação */
    .avaliar-area {
      margin-top: 12px;
    }
    .avaliar-btn {
      background: var(--verde-btn);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }
    .avaliar-form {
      background: #faf9f6;
      border-radius: 20px;
      padding: 16px;
      margin-top: 12px;
      display: none;
    }
    .avaliar-form.open {
      display: block;
    }
    .stars-select {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      justify-content: center;
    }
    .star-select {
      font-size: 28px;
      cursor: pointer;
      color: #ddd;
      transition: 0.1s;
    }
    .star-select.selected {
      color: var(--laranja);
    }
    textarea {
      width: 100%;
      border: 1px solid #e2dacf;
      border-radius: 16px;
      padding: 10px;
      font-family: inherit;
      font-size: 12px;
      margin: 12px 0;
      resize: vertical;
    }
    .btn-enviar {
      background: var(--verde-btn);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
    }

    /* MENU LATERAL (idêntico ao meu_perfil.html) */
    .menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(2px);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s;
    }
    .menu-drawer {
      position: absolute;
      top: 0;
      right: 0;
      width: min(280px,85%);
      min-width:260px;
      height:100%;
      background: var(--branco);
      box-shadow: -8px 0 24px rgba(0,0,0,0.15);
      z-index:101;
      transform:translateX(100%);
      transition:transform 0.3s;
      overflow-y:auto;
      border-radius:20px 0 0 20px;
    }
    .menu-overlay.open {
      opacity:1;
      visibility:visible;
    }
    .menu-overlay.open .menu-drawer {
      transform:translateX(0);
    }
    .menu-header {
      padding:28px 20px 20px;
      background:linear-gradient(135deg,#3a5f1e,#2d5016);
      color:white;
      border-bottom:1px solid rgba(255,255,255,0.2);
    }
    .menu-user {
      display:flex;
      align-items:center;
      gap:12px;
    }
    .menu-avatar {
      width:52px;
      height:52px;
      background:linear-gradient(145deg,#d48f3b,#b56a1a);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .menu-avatar img {
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
    }
    .menu-avatar svg {
      width: 30px;
      height: 30px;
      stroke: white;
      stroke-width: 1.8;
      fill: none;
    }
    .menu-user-info h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .menu-user-info p {
      font-size: 12px;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .menu-user-info p svg {
      width: 14px;
      height: 14px;
      stroke: white;
      stroke-width: 2;
    }
    .menu-close {
      position:absolute;
      top:16px;
      right:16px;
      background:rgba(255,255,255,0.2);
      border:none;
      width:36px;
      height:36px;
      border-radius:50%;
      cursor:pointer;
    }
    .menu-close svg {
      width:20px;
      height:20px;
      stroke:white;
      stroke-width:2;
    }
    .menu-nav {
      padding:12px 0 20px;
    }
    .menu-item {
      display:flex;
      align-items:center;
      gap:14px;
      padding:12px 20px;
      font-size:15px;
      font-weight:500;
      color:var(--texto);
      cursor:pointer;
    }
    .menu-item:hover {
      background:#f0ede7;
    }
    .menu-item .menu-icon {
      width:26px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .menu-item .menu-icon svg {
      width:22px;
      height:22px;
      stroke:currentColor;
      stroke-width:1.8;
      fill:none;
    }
    .menu-item .menu-text {
      flex:1;
    }
    .divider {
      height:1px;
      background:var(--borda);
      margin:8px 16px;
    }
    .section-title {
      font-size:13px;
      font-weight:600;
      color:#888;
      letter-spacing:0.5px;
      padding:12px 20px 4px;
      text-transform:uppercase;
    }
    .footer-menu {
      border-top:1px solid var(--borda);
      margin-top:8px;
      padding:8px 0;
    }

    @media (max-width: 400px) {
      .header-content {
        padding: 52px 16px 14px;
      }
      .btn-icon {
        width: 40px;
        height: 40px;
      }
      .btn-icon svg {
        width: 22px;
        height: 22px;
      }
      .logo-wrap img {
        height: 36px;
      }
      .title-bar {
        padding: 12px 16px;
      }
      .title-bar h1 {
        font-size: 16px;
      }
      .perfil-hero {
        padding-top: 20px;
        padding-bottom: 35px;
      }
      .avatar-wrap {
        width: 80px;
        height: 80px;
      }
      .body {
        padding: 0 12px 100px;
      }
      .card {
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
<div class="frame">
  <!-- HEADER COM SUPERIOR.PNG -->
  <div class="header">
    <div class="header-bg"></div>
    <div class="header-content">
      <button class="btn-icon" id="backButton">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="logo-wrap"><img alt="PlanoV"></div>
      <button class="btn-icon" id="menuButton">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div class="title-bar">
    <h1>Perfil da Empresa</h1>
  </div>

  <!-- HERO COM AVATAR E BADGE -->
  <div class="perfil-hero">
    <div class="avatar-wrap" id="avatarWrap">
      <div class="avatar-placeholder" id="avatarPlaceholder">
        <svg viewBox="0 0 60 60"><circle cx="30" cy="20" r="12" fill="#f5d59a"/><path d="M10 52c0-11 9-18 20-18s20 7 20 18" fill="#4a7c28"/><ellipse cx="30" cy="10" rx="14" ry="4" fill="#8B5E14"/><rect x="16" y="6" width="28" height="6" rx="3" fill="#a06820"/></svg>
      </div>
      <img id="avatarImg" src="" style="display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">
    </div>
    <div class="badge-empresa" id="badgeEmpresa">Empresa</div>
  </div>

  <!-- CORPO PRINCIPAL -->
  <div class="body">
    <!-- NOME DA EMPRESA (centralizado) -->
    <div style="text-align: center; margin: 8px 0 16px;">
      <h2 id="empresaNome" style="font-size: 22px; font-weight: 700; color: var(--texto);">Carregando...</h2>
    </div>

    <!-- SOBRE -->
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Sobre
      </div>
      <div class="sobre-texto" id="sobreTexto">-</div>
    </div>

    <!-- SERVIÇOS QUE CONTRATA -->
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Serviços que contrata
      </div>
      <div class="tags-wrap" id="servicosTags"></div>
    </div>

    <!-- AVALIAÇÃO MÉDIA -->
    <div class="avaliacao-media">
      <svg class="star-big" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span class="media-valor" id="mediaNota">-</span>
      <span class="media-label" id="mediaLabel">avaliação média</span>
    </div>

    <!-- LISTA DE AVALIAÇÕES -->
    <div>
      <div class="card-title" style="margin-bottom: 8px;">Avaliações</div>
      <ul class="reviews-list" id="reviewsList"></ul>
    </div>

    <!-- ÁREA PARA AVALIAR (só para usuários logados não-donos) -->
    <div id="avaliarArea" class="avaliar-area" style="display: none;">
      <button class="avaliar-btn" id="toggleFormBtn">Avaliar esta empresa</button>
      <div id="avaliarForm" class="avaliar-form">
        <div class="stars-select" id="starsSelect">
          <span data-value="1" class="star-select">☆</span>
          <span data-value="2" class="star-select">☆</span>
          <span data-value="3" class="star-select">☆</span>
          <span data-value="4" class="star-select">☆</span>
          <span data-value="5" class="star-select">☆</span>
        </div>
        <textarea id="comentarioInput" rows="2" placeholder="Deixe seu comentário (opcional)"></textarea>
        <button class="btn-enviar" id="enviarAvaliacaoBtn">Enviar avaliação</button>
      </div>
    </div>
  </div>

  <!-- MENU LATERAL (DRAWER) -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-drawer">
      <button class="menu-close" id="closeMenuBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="menu-header">
        <div class="menu-user">
          <div class="menu-avatar" id="menuAvatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M12 2v4M12 6c-2.5 0-4 2-4 4h8c0-2-1.5-4-4-4z"/><path d="M12 10v10M8 20h8"/><path d="M5 18c1.5-1 3-1.5 5-1.5"/><path d="M19 18c-1.5-1-3-1.5-5-1.5"/></svg>
          </div>
          <div class="menu-user-info">
            <h4 id="menuNome">Carregando...</h4>
            <p><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3v6c0 2.5-2 4-4 4"/><path d="M12 9c2 0 4 1.5 4 4"/><path d="M6 21c2-2 4-3 6-3s4 1 6 3"/></svg><span id="menuTipo">Usuário</span></p>
          </div>
        </div>
      </div>
      <div class="menu-nav">
        <div class="menu-item" data-nav="inicio"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="menu-text">Início</div></div>
        <div class="menu-item" data-nav="empresas"><div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><div class="menu-text">Empresas</div></div>
        <div class="menu-item" data-nav="agenda"><div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="15" r="1"/><circle cx="16" cy="15" r="1"/><circle cx="8" cy="15" r="1"/></svg></div><div class="menu-text">Minha Agenda</div></div>
        <div class="divider"></div>
        <div class="section-title">CONFIGURAÇÕES</div>
        <div class="menu-item" data-nav="perfil"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="menu-text">Meu Perfil</div></div>
        <div class="menu-item" data-nav="configuracoes"><div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><div class="menu-text">Configurações</div></div>
        <div class="menu-item" data-nav="ajuda"><div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="menu-text">Ajuda</div></div>
        <div class="divider"></div>
        <div class="footer-menu"><div class="menu-item" data-nav="sair"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div><div class="menu-text">Sair</div></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ================= CONFIGURAÇÕES =================
  const API_BASE_URL = 'http://localhost:3000/api';
  let token = localStorage.getItem('token');
  let loggedUser = JSON.parse(localStorage.getItem('user') || '{}');

  const urlParams = new URLSearchParams(window.location.search);
  const empresaId = urlParams.get('id');
  if (!empresaId) {
    alert('Empresa não especificada.');
    window.location.href = 'buscar-empresas.html';
  }

  // ========== ELEMENTOS DO DOM ==========
  const empresaNomeEl = document.getElementById('empresaNome');
  const sobreTextoEl = document.getElementById('sobreTexto');
  const servicosTagsEl = document.getElementById('servicosTags');
  const mediaNotaEl = document.getElementById('mediaNota');
  const mediaLabelEl = document.getElementById('mediaLabel');
  const reviewsListEl = document.getElementById('reviewsList');
  const avatarImg = document.getElementById('avatarImg');
  const avatarPlaceholder = document.getElementById('avatarPlaceholder');

  let currentRating = 0;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  async function carregarEmpresa() {
    try {
      const res = await fetch(`${API_BASE_URL}/profile/${empresaId}`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
      });
      if (!res.ok) throw new Error('Erro ao carregar empresa');
      const data = await res.json();
      const user = data.user;

      empresaNomeEl.innerText = user.nome || 'Empresa';
      sobreTextoEl.innerText = user.sobre || 'Sem descrição.';

      // Foto de perfil
      if (user.foto_perfil && (user.foto_perfil.startsWith('http') || user.foto_perfil.startsWith('data:image'))) {
        avatarImg.src = user.foto_perfil;
        avatarImg.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
      } else {
        avatarImg.style.display = 'none';
        avatarPlaceholder.style.display = 'flex';
      }

      // Serviços que contrata
      let servicos = [];
      if (user.servicos_contrata) {
        try {
          servicos = JSON.parse(user.servicos_contrata);
        } catch(e) {
          servicos = user.servicos_contrata.split(',').map(s => s.trim());
        }
      }
      servicosTagsEl.innerHTML = '';
      if (servicos.length) {
        servicos.forEach(s => {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.innerText = s;
          servicosTagsEl.appendChild(tag);
        });
      } else {
        servicosTagsEl.innerHTML = '<span class="tag">Não informado</span>';
      }
    } catch (err) {
      console.error(err);
      empresaNomeEl.innerText = 'Erro';
      sobreTextoEl.innerText = 'Não foi possível carregar os dados.';
    }
  }

  async function carregarAvaliacoes() {
    try {
      const res = await fetch(`${API_BASE_URL}/reviews/${empresaId}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const media = data.media ? parseFloat(data.media) : 0;
      const total = data.total || 0;
      mediaNotaEl.innerText = media > 0 ? media.toFixed(1) : '—';
      mediaLabelEl.innerText = media > 0 ? `avaliação média (${total} avaliações)` : 'sem avaliações';

      reviewsListEl.innerHTML = '';
      if (data.reviews && data.reviews.length) {
        data.reviews.forEach(rev => {
          const estrelas = '★'.repeat(rev.nota) + '☆'.repeat(5 - rev.nota);
          const li = document.createElement('li');
          li.className = 'review-item';
          li.innerHTML = `
            <div class="review-header">
              <span class="review-author">${escapeHtml(rev.avaliador.nome)}</span>
              <span class="stars">${estrelas}</span>
            </div>
            <div class="review-text">${escapeHtml(rev.comentario || '')}</div>
          `;
          reviewsListEl.appendChild(li);
        });
      } else {
        reviewsListEl.innerHTML = '<div style="text-align:center;color:#888;">Nenhuma avaliação ainda.</div>';
      }
    } catch (err) {
      console.error(err);
      reviewsListEl.innerHTML = '<div style="text-align:center;color:#888;">Erro ao carregar avaliações.</div>';
    }
  }

  // ========== LÓGICA DE AVALIAÇÃO (usuário logado e não dono) ==========
  const avaliarArea = document.getElementById('avaliarArea');
  const toggleFormBtn = document.getElementById('toggleFormBtn');
  const avaliarForm = document.getElementById('avaliarForm');
  const starsSelectSpan = document.querySelectorAll('.star-select');
  const enviarBtn = document.getElementById('enviarAvaliacaoBtn');
  const comentarioInput = document.getElementById('comentarioInput');

  if (token && loggedUser.id && loggedUser.id != empresaId) {
    avaliarArea.style.display = 'block';
    toggleFormBtn.addEventListener('click', () => {
      avaliarForm.classList.toggle('open');
    });
    starsSelectSpan.forEach(star => {
      star.addEventListener('click', () => {
        currentRating = parseInt(star.getAttribute('data-value'));
        starsSelectSpan.forEach(s => {
          const val = parseInt(s.getAttribute('data-value'));
          s.innerText = val <= currentRating ? '★' : '☆';
          s.classList.toggle('selected', val <= currentRating);
        });
      });
    });
    enviarBtn.addEventListener('click', async () => {
      if (currentRating === 0) {
        alert('Selecione uma classificação em estrelas.');
        return;
      }
      const comentario = comentarioInput.value.trim();
      try {
        const res = await fetch(`${API_BASE_URL}/reviews`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            avaliado_id: parseInt(empresaId),
            nota: currentRating,
            comentario: comentario
          })
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Erro ao enviar avaliação');
        }
        alert('Avaliação enviada com sucesso!');
        window.location.reload();
      } catch (err) {
        alert(err.message);
      }
    });
  } else {
    avaliarArea.style.display = 'none';
  }

  // ========== MENU LATERAL (idêntico ao meu_perfil.html) ==========
  const menuOverlay = document.getElementById('menuOverlay');
  const menuBtn = document.getElementById('menuButton');
  const closeMenuBtn = document.getElementById('closeMenuBtn');
  const backButton = document.getElementById('backButton');

  function openMenu() { menuOverlay.classList.add('open'); }
  function closeMenu() { menuOverlay.classList.remove('open'); }
  menuBtn.addEventListener('click', openMenu);
  closeMenuBtn.addEventListener('click', closeMenu);
  menuOverlay.addEventListener('click', (e) => { if (e.target === menuOverlay) closeMenu(); });
  backButton.addEventListener('click', () => window.history.back());

  // Atualizar menu com dados do usuário logado
  const menuNome = document.getElementById('menuNome');
  const menuTipo = document.getElementById('menuTipo');
  const menuAvatarDiv = document.getElementById('menuAvatar');

  if (token && loggedUser.id) {
    menuNome.innerText = `${loggedUser.nome || ''} ${loggedUser.sobrenome || ''}`.trim() || 'Usuário';
    menuTipo.innerText = loggedUser.tipo_usuario === 'prestador' ? 'Prestador' : (loggedUser.tipo_usuario === 'empresa' ? 'Empresa' : 'Usuário');
    if (loggedUser.foto_perfil && (loggedUser.foto_perfil.startsWith('http') || loggedUser.foto_perfil.startsWith('data:image'))) {
      menuAvatarDiv.innerHTML = `<img src="${loggedUser.foto_perfil}" style="width:100%;height:100%;object-fit:cover; border-radius:50%;">`;
    }
  } else {
    menuNome.innerText = 'Visitante';
    menuTipo.innerText = 'Convidado';
  }

  // Navegação do menu
  document.querySelectorAll('.menu-item[data-nav]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const nav = item.getAttribute('data-nav');
      if (nav === 'sair') {
        if (confirm('Deseja realmente sair da sua conta?')) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.href = 'login.html';
        }
        closeMenu();
      } else if (nav === 'inicio') {
        window.location.href = 'home.html';
      } else if (nav === 'empresas') {
        if (loggedUser.tipo_usuario === 'prestador') window.location.href = 'buscar-empresas.html';
        else window.location.href = 'buscar-prestadores.html';
      } else if (nav === 'agenda') {
        window.location.href = 'agenda.html';
      } else if (nav === 'perfil') {
        window.location.href = 'meu_perfil.html';
      } else if (nav === 'configuracoes') {
        alert('Configurações em breve');
        closeMenu();
      } else if (nav === 'ajuda') {
        alert('Central de ajuda em breve');
        closeMenu();
      } else {
        closeMenu();
      }
    });
  });

  // ========== INICIALIZAÇÃO ==========
  carregarEmpresa();
  carregarAvaliacoes();
</script>
</body>
</html>
