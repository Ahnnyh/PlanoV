<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PlanoV – Perfil da Empresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* MANTER O CSS ORIGINAL DO ARQUIVO (o mesmo que você tem) */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root { --verde: #3a5f1e; --verde-btn: #2d5016; --verde-card: #4a7c28; --verde-light: #e8f0df; --laranja: #e07a1c; --laranja-range: #f0a050; --bg: #f7f4ee; --branco: #ffffff; --texto: #1a1a1a; --muted: #777; --borda: #e0ddd6; }
    body { font-family: 'Poppins', sans-serif; background: #cdc8bc; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
    .frame { width: 100%; max-width: 450px; background: var(--bg); border-radius: 44px; overflow: hidden; border: 1px solid #d4cfc2; box-shadow: 0 25px 40px -12px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; position: relative; margin: 0 auto; }
    .header { position: relative; height: 210px; flex-shrink: 0; overflow: hidden; border-top-left-radius: 44px; border-top-right-radius: 44px; }
    .header-bg { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header-top { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 0; }
    .btn-icon { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
    .btn-icon:active { background: rgba(0,0,0,0.05); }
    .btn-icon svg { width: 24px; height: 24px; stroke: #2d4f14; stroke-width: 2.5; stroke-linecap: round; fill: none; stroke-linejoin: round; }
    .logo-wrap img { height: 40px; display: block; content: url('IMG/logo.png'); }
    .fazenda-nome-wrap { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 6px 16px; border-radius: 40px; }
    .fazenda-nome { font-size: 18px; font-weight: 700; color: white; margin: 0; }
    .body { flex: 1; overflow-y: auto; scrollbar-width: none; background: var(--bg); padding: 20px 16px 40px; }
    .body::-webkit-scrollbar { display: none; }
    .section { margin-bottom: 24px; }
    .sobre-card { background: var(--branco); border-radius: 16px; border: 1px solid var(--borda); padding: 16px; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .section-icon { width: 20px; height: 20px; stroke: var(--verde-card); stroke-width: 2; }
    .section-label { font-size: 15px; font-weight: 600; color: var(--verde-card); }
    .sobre-texto { font-size: 13px; color: var(--texto); line-height: 1.6; }
    .section-title { font-size: 16px; font-weight: 700; color: var(--texto); margin-bottom: 12px; }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
    .tag { background: var(--verde-light); padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 500; color: var(--verde-card); }
    .divider { height: 1px; background: var(--borda); margin: 16px 0; }
    .rating-section { display: flex; justify-content: center; }
    .avg-rating { display: flex; align-items: baseline; gap: 6px; background: var(--branco); padding: 10px 20px; border-radius: 60px; border: 1px solid var(--borda); }
    .star-big { width: 24px; height: 24px; fill: var(--laranja); stroke: none; }
    .avg-number { font-size: 24px; font-weight: 800; color: var(--texto); }
    .avg-label { font-size: 13px; color: var(--muted); }
    .reviews-list { list-style: none; }
    .review-card { background: var(--branco); border-radius: 14px; border: 1px solid var(--borda); padding: 14px; margin-bottom: 12px; }
    .review-header { display: flex; gap: 12px; margin-bottom: 10px; }
    .review-avatar { width: 40px; height: 40px; background: #e0ddd6; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .review-avatar svg { width: 22px; height: 22px; stroke: #888; }
    .review-author-info { flex: 1; }
    .review-author { font-size: 13px; font-weight: 700; color: var(--texto); display: block; margin-bottom: 4px; }
    .review-stars { display: flex; gap: 3px; }
    .star { width: 14px; height: 14px; fill: var(--laranja); stroke: none; }
    .review-text { font-size: 12px; color: #555; line-height: 1.5; margin-left: 52px; }
    .nova-avaliacao-section { background: var(--branco); border-radius: 16px; border: 1px solid var(--borda); overflow: hidden; margin-top: 8px; }
    .avaliacao-header-click { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; transition: background 0.2s; }
    .avaliacao-header-click:hover { background: #f0ede7; }
    .toggle-icon { width: 20px; height: 20px; stroke: var(--verde-card); transition: transform 0.3s; }
    .avaliacao-content { padding: 0 16px 20px; display: none; border-top: 1px solid var(--borda); }
    .avaliacao-content.open { display: block; }
    .rating-input-wrap { text-align: center; margin-bottom: 16px; }
    .stars-input { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .star-input { width: 32px; height: 32px; fill: #ddd; stroke: none; cursor: pointer; transition: fill 0.2s; }
    .star-input.active { fill: var(--laranja); }
    .rating-feedback { font-size: 12px; color: var(--muted); }
    .review-textarea { width: 100%; font-family: 'Poppins', sans-serif; font-size: 13px; padding: 12px; border: 1px solid var(--borda); border-radius: 12px; resize: vertical; margin-bottom: 16px; background: #fefefe; }
    .btn-enviar-avaliacao { width: 100%; background: var(--verde-btn); color: white; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; border: none; border-radius: 12px; padding: 12px; cursor: pointer; transition: background 0.2s; }
    .btn-enviar-avaliacao:active { transform: scale(0.98); }
    /* MENU LATERAL (mesmo) */
    .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 100; opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s; }
    .menu-drawer { position: absolute; top: 0; right: 0; width: min(280px, 85%); min-width: 260px; height: 100%; background: #ffffff; box-shadow: -8px 0 24px rgba(0, 0, 0, 0.15); z-index: 101; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); overflow-y: auto; border-radius: 20px 0 0 20px; }
    .menu-overlay.open { opacity: 1; visibility: visible; }
    .menu-overlay.open .menu-drawer { transform: translateX(0); }
    .menu-header { padding: 28px 20px 20px; background: linear-gradient(135deg, #3a5f1e, #2d5016); color: white; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .menu-user { display: flex; align-items: center; gap: 12px; }
    .menu-avatar { width: 52px; height: 52px; background: linear-gradient(145deg, #d48f3b, #b56a1a); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .menu-avatar svg { width: 30px; height: 30px; stroke: white; stroke-width: 1.8; fill: none; }
    .menu-user-info h4 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .menu-user-info p { font-size: 12px; opacity: 0.85; display: flex; align-items: center; gap: 6px; }
    .menu-user-info p svg { width: 14px; height: 14px; stroke: white; stroke-width: 2; }
    .menu-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
    .menu-close svg { width: 20px; height: 20px; stroke: white; stroke-width: 2; }
    .menu-nav { padding: 12px 0 20px; }
    .menu-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; font-size: 15px; font-weight: 500; color: #1a1a1a; transition: background 0.2s; cursor: pointer; }
    .menu-item:hover, .menu-item:active { background: #f0ede7; }
    .menu-item .menu-icon { width: 26px; display: flex; align-items: center; justify-content: center; }
    .menu-item .menu-icon svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .menu-item .menu-text { flex: 1; }
    .divider { height: 1px; background: #e0ddd6; margin: 8px 16px; }
    .section-title-menu { font-size: 13px; font-weight: 600; color: #888; letter-spacing: 0.5px; padding: 12px 20px 4px; text-transform: uppercase; }
    .footer-menu { border-top: 1px solid #e0ddd6; margin-top: 8px; padding: 8px 0; }
    @media (max-width: 400px) { /* ... */ }
    @media (max-width: 340px) { /* ... */ }
  </style>
</head>
<body>
<div class="frame">
  <div class="header">
    <img src="IMG/capa_fazenda.png" alt="Fazenda" class="header-bg">
    <div class="header-top">
      <button class="btn-icon" id="backButton" aria-label="Voltar">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="logo-wrap"><img src="IMG/logo.png" alt="PlanoV"></div>
      <button class="btn-icon" id="menuButton">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="fazenda-nome-wrap"><h1 class="fazenda-nome" id="empresa-nome">Carregando...</h1></div>
  </div>
  <div class="body">
    <div class="section sobre-card">
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span class="section-label">Sobre</span>
      </div>
      <p class="sobre-texto" id="empresa-sobre">-</p>
    </div>
    <div class="section">
      <h2 class="section-title">Serviços que contrata</h2>
      <div class="tags-wrap" id="servicos-tags"></div>
    </div>
    <div class="divider"></div>
    <div class="section rating-section">
      <div class="avg-rating">
        <svg class="star-big" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span class="avg-number" id="avaliacao-media">-</span>
        <span class="avg-label" id="avaliacao-label">avaliação média</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section">
      <ul class="reviews-list" id="reviewsList"></ul>
    </div>
    <div class="nova-avaliacao-section" id="avaliacaoAccordion" style="display: none;">
      <div class="avaliacao-header-click" id="accordionHeader">
        <div class="section-header">
          <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span class="section-label">Avaliar esta empresa</span>
        </div>
        <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="avaliacao-content" id="avaliacaoContent">
        <div class="rating-input-wrap">
          <div class="stars-input" id="starsInput">
            <svg class="star-input" data-value="1" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg class="star-input" data-value="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg class="star-input" data-value="3" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg class="star-input" data-value="4" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg class="star-input" data-value="5" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
          <span class="rating-feedback" id="ratingFeedback">Clique nas estrelas para avaliar</span>
        </div>
        <textarea id="reviewComment" class="review-textarea" placeholder="Escreva seu comentário (opcional)..." rows="3"></textarea>
        <button class="btn-enviar-avaliacao" id="btnEnviarAvaliacao">Enviar avaliação</button>
      </div>
    </div>
  </div>
</div>
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-drawer">
    <button class="menu-close" id="closeMenuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="menu-header">
      <div class="menu-user">
        <div class="menu-avatar" id="menuAvatarContainer">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
            <path d="M12 2v4M12 6c-2.5 0-4 2-4 4h8c0-2-1.5-4-4-4z" stroke-linecap="round"/>
            <path d="M12 10v10M8 20h8" stroke-linecap="round"/>
            <path d="M5 18c1.5-1 3-1.5 5-1.5" stroke-linecap="round"/>
            <path d="M19 18c-1.5-1-3-1.5-5-1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="menu-user-info">
          <h4 id="menuNome">Visitante</h4>
          <p><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3v6c0 2.5-2 4-4 4" stroke-linecap="round"/><path d="M12 9c2 0 4 1.5 4 4" stroke-linecap="round"/><path d="M6 21c2-2 4-3 6-3s4 1 6 3" stroke-linecap="round"/></svg><span id="menuTipo">Convidado</span></p>
        </div>
      </div>
    </div>
    <div class="menu-nav">
      <div class="menu-item" data-nav="inicio"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="menu-text">Início</div></div>
      <div class="menu-item" data-nav="empresas"><div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><div class="menu-text">Empresas</div></div>
      <div class="menu-item" data-nav="agenda"><div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="15" r="1"/><circle cx="16" cy="15" r="1"/><circle cx="8" cy="15" r="1"/></svg></div><div class="menu-text">Minha Agenda</div></div>
      <div class="divider"></div>
      <div class="section-title-menu">CONTA</div>
      <div class="menu-item" data-nav="login" id="menu-login"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="menu-text">Entrar / Cadastrar</div></div>
      <div class="menu-item" data-nav="perfil" id="menu-perfil" style="display:none;"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="menu-text">Meu Perfil</div></div>
      <div class="menu-item" data-nav="sair" id="menu-sair" style="display:none;"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div><div class="menu-text">Sair</div></div>
      <div class="divider"></div>
      <div class="menu-item" data-nav="ajuda"><div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="menu-text">Ajuda</div></div>
    </div>
  </div>
</div>
<script>
  const API_BASE_URL = 'http://localhost:3000/api';
  let token = localStorage.getItem('token');
  let loggedUser = JSON.parse(localStorage.getItem('user') || '{}');
  const urlParams = new URLSearchParams(window.location.search);
  const empresaId = urlParams.get('id');
  if (!empresaId) { alert('Empresa não especificada.'); window.location.href = 'buscar-empresas.html'; }

  const menuAvatarContainer = document.getElementById('menuAvatarContainer');
  const menuNome = document.getElementById('menuNome');
  const menuTipo = document.getElementById('menuTipo');
  const menuLogin = document.getElementById('menu-login');
  const menuPerfil = document.getElementById('menu-perfil');
  const menuSair = document.getElementById('menu-sair');
  if (token && loggedUser.id) {
    menuNome.innerText = `${loggedUser.nome} ${loggedUser.sobrenome || ''}`.trim();
    menuTipo.innerText = loggedUser.tipo_usuario === 'prestador' ? 'Prestador' : (loggedUser.tipo_usuario === 'empresa' ? 'Empresa' : 'Usuário');
    menuLogin.style.display = 'none';
    menuPerfil.style.display = 'flex';
    menuSair.style.display = 'flex';
    if (loggedUser.foto_perfil && loggedUser.foto_perfil.startsWith('data:image')) {
      menuAvatarContainer.innerHTML = `<img src="${loggedUser.foto_perfil}" style="width:100%;height:100%;object-fit:cover; border-radius:50%;">`;
    }
  } else {
    menuNome.innerText = 'Visitante';
    menuTipo.innerText = 'Convidado';
    menuLogin.style.display = 'flex';
    menuPerfil.style.display = 'none';
    menuSair.style.display = 'none';
  }

  const empresaNomeEl = document.getElementById('empresa-nome');
  const empresaSobreEl = document.getElementById('empresa-sobre');
  const servicosTagsContainer = document.getElementById('servicos-tags');
  const mediaNumEl = document.getElementById('avaliacao-media');
  const mediaLabelEl = document.getElementById('avaliacao-label');
  const reviewsListEl = document.getElementById('reviewsList');
  const avaliacaoAccordion = document.getElementById('avaliacaoAccordion');

  async function carregarEmpresa() {
    try {
      const response = await fetch(`${API_BASE_URL}/profile/${empresaId}`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
      });
      if (!response.ok) throw new Error('Empresa não encontrada');
      const data = await response.json();
      const user = data.user;
      empresaNomeEl.innerText = user.nome || 'Empresa';
      empresaSobreEl.innerText = user.sobre || 'Empresa do agronegócio.';
      let servicosContrata = [];
      if (user.servicos_contrata) {
        try { servicosContrata = JSON.parse(user.servicos_contrata); } catch(e) { servicosContrata = user.servicos_contrata.split(',').map(s => s.trim()); }
      }
      servicosTagsContainer.innerHTML = '';
      if (servicosContrata.length) {
        servicosContrata.forEach(serv => { const tag = document.createElement('span'); tag.className = 'tag'; tag.innerText = serv; servicosTagsContainer.appendChild(tag); });
      } else { servicosTagsContainer.innerHTML = '<span class="tag">Não informado</span>'; }
    } catch (err) { console.error(err); empresaNomeEl.innerText = 'Erro ao carregar'; empresaSobreEl.innerText = 'Não foi possível carregar os dados.'; }
  }

  async function carregarAvaliacoes() {
    try {
      const response = await fetch(`${API_BASE_URL}/reviews/${empresaId}`);
      if (!response.ok) throw new Error('Erro ao carregar avaliações');
      const data = await response.json();
      const media = data.media ? parseFloat(data.media) : 0;
      const total = data.total || 0;
      if (media > 0) { mediaNumEl.innerText = media.toFixed(1); mediaLabelEl.innerText = `avaliação média (${total} avaliações)`; }
      else { mediaNumEl.innerText = '—'; mediaLabelEl.innerText = 'sem avaliações'; }
      reviewsListEl.innerHTML = '';
      if (data.reviews && data.reviews.length) {
        data.reviews.forEach(rev => {
          const avaliadorNome = rev.avaliador.nome;
          const nota = rev.nota;
          const comentario = rev.comentario || '';
          const starsHtml = Array(5).fill(0).map((_, i) => i < nota ? '★' : '☆').join('');
          const card = document.createElement('li');
          card.className = 'review-card';
          card.innerHTML = `
            <div class="review-header">
              <div class="review-avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
              <div class="review-author-info">
                <span class="review-author">${escapeHtml(avaliadorNome)}</span>
                <div class="review-stars">${starsHtml}</div>
              </div>
            </div>
            <p class="review-text">${escapeHtml(comentario)}</p>
          `;
          reviewsListEl.appendChild(card);
        });
      } else { reviewsListEl.innerHTML = '<li style="text-align:center; color:#888;">Nenhuma avaliação ainda.</li>'; }
    } catch (err) { console.error(err); reviewsListEl.innerHTML = '<li style="text-align:center; color:#888;">Erro ao carregar avaliações.</li>'; }
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

  const accordionHeader = document.getElementById('accordionHeader');
  const avaliacaoContent = document.getElementById('avaliacaoContent');
  const toggleIcon = document.querySelector('.toggle-icon');
  const starsInputs = document.querySelectorAll('.star-input');
  let currentRating = 0;
  const ratingFeedback = document.getElementById('ratingFeedback');
  const btnEnviar = document.getElementById('btnEnviarAvaliacao');
  const reviewComment = document.getElementById('reviewComment');
  function setStars(rating) { starsInputs.forEach((star, idx) => { if (idx < rating) star.classList.add('active'); else star.classList.remove('active'); }); }
  starsInputs.forEach(star => {
    star.addEventListener('click', () => { const value = parseInt(star.getAttribute('data-value')); currentRating = value; setStars(currentRating); ratingFeedback.textContent = `Você selecionou ${currentRating} estrela${currentRating > 1 ? 's' : ''}`; });
    star.addEventListener('mouseenter', () => { const value = parseInt(star.getAttribute('data-value')); setStars(value); });
    star.addEventListener('mouseleave', () => { setStars(currentRating); });
  });
  if (token && loggedUser.id && loggedUser.id != empresaId) {
    avaliacaoAccordion.style.display = 'block';
    if (accordionHeader) accordionHeader.addEventListener('click', () => { const isOpen = avaliacaoContent.classList.contains('open'); if (isOpen) { avaliacaoContent.classList.remove('open'); toggleIcon.style.transform = 'rotate(0deg)'; } else { avaliacaoContent.classList.add('open'); toggleIcon.style.transform = 'rotate(180deg)'; } });
    if (btnEnviar) btnEnviar.addEventListener('click', async () => {
      if (currentRating === 0) { alert('Selecione uma classificação em estrelas.'); return; }
      const comentario = reviewComment.value.trim();
      try {
        const response = await fetch(`${API_BASE_URL}/reviews`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ avaliado_id: parseInt(empresaId), nota: currentRating, comentario: comentario })
        });
        if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Erro ao enviar avaliação'); }
        alert('Avaliação enviada com sucesso!');
        currentRating = 0; setStars(0); reviewComment.value = ''; ratingFeedback.textContent = 'Clique nas estrelas para avaliar';
        avaliacaoContent.classList.remove('open'); toggleIcon.style.transform = 'rotate(0deg)';
        carregarAvaliacoes();
      } catch (err) { alert(err.message); }
    });
  } else { avaliacaoAccordion.style.display = 'none'; }

  const menuOverlay = document.getElementById('menuOverlay');
  const menuBtn = document.getElementById('menuButton');
  const closeMenuBtn = document.getElementById('closeMenuBtn');
  const backButton = document.getElementById('backButton');
  function openMenu() { menuOverlay.classList.add('open'); }
  function closeMenu() { menuOverlay.classList.remove('open'); }
  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenu);
  if (menuOverlay) menuOverlay.addEventListener('click', (e) => { if (e.target === menuOverlay) closeMenu(); });
  if (backButton) backButton.addEventListener('click', () => window.history.back());
  document.querySelectorAll('.menu-item[data-nav]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const nav = item.getAttribute('data-nav');
      if (nav === 'sair') { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'login.html'; }
      else if (nav === 'inicio') window.location.href = 'home.html';
      else if (nav === 'empresas') window.location.href = (loggedUser.tipo_usuario === 'prestador') ? 'buscar-empresas.html' : 'buscar-prestadores.html';
      else if (nav === 'agenda') window.location.href = 'agenda.html';
      else if (nav === 'perfil') window.location.href = 'meu_perfil.html';
      else if (nav === 'login') window.location.href = 'login.html';
      else if (nav === 'ajuda') alert('Central de ajuda em breve.');
      else closeMenu();
    });
  });
  carregarEmpresa(); carregarAvaliacoes();
</script>
</body>
</html>
