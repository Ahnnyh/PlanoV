<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PlanoV - Meu Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --verde: #3a5f1e; --verde-btn: #2d5016; --verde-card: #4a7c28; --laranja: #e07a1c; --laranja-mid: #f0a050; --bg: #f7f4ee; --branco: #ffffff; --texto: #1a1a1a; --muted: #888; --borda: #e0ddd6; }
body { font-family: 'Poppins', sans-serif; background: #cdc8bc; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
.frame { width: 100%; max-width: 450px; background: var(--bg); border-radius: 44px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.4); display: flex; flex-direction: column; position: relative; min-height: 700px; margin: 0 auto; }
/* HEADER */
.header { position: relative; overflow: hidden; flex-shrink: 0; }
.header-bg { position: absolute; inset: 0; background-image: url('img/superior.png'); background-size: cover; background-position: left; }
.header-content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 18px; }
.btn-icon { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
.btn-icon:active { background: rgba(0,0,0,0.05); }
.btn-icon svg { width: 24px; height: 24px; stroke: #2d4f14; stroke-width: 2.5; stroke-linecap: round; fill: none; stroke-linejoin: round; }
.logo-wrap img { height: 40px; content: url('img/logo.png'); }
.title-bar { background: var(--verde); padding: 14px 20px; text-align: center; flex-shrink: 0; }
.title-bar h1 { font-size: 18px; font-weight: 700; color: #fff; }
.perfil-hero { position: relative; background-image: url('img/inferior.png'); background-size: cover; background-position: center 30%; padding-top: 24px; padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.perfil-hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to bottom, transparent, var(--bg)); }

/* AVATAR REDONDO COM ÍCONE METADE FORA */
.avatar-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  cursor: pointer;
  border-radius: 50%;
  background: #c8a96e;
}
.avatar-inner {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  overflow: hidden;
}
.avatar-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}
.avatar-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #8B6914, #c8a050);
}
.avatar-placeholder svg {
  width: 64px;
  height: 64px;
}
.edit-photo-icon {
  position: absolute;
  bottom: -6px;
  right: -6px;
  background: var(--laranja);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid white;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
.edit-photo-icon svg {
  width: 18px;
  height: 18px;
  stroke: white;
  stroke-width: 2;
}
/* FIM AVATAR */

.badge-prestador { margin-top: 8px; background: var(--laranja); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 14px; border-radius: 20px; }
.body { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 0 16px 100px; background: var(--bg); }
.body::-webkit-scrollbar { display: none; }
.editable-input { font-family: 'Poppins', sans-serif; color: var(--texto); border: none; border-bottom: 1px dashed var(--borda); background: transparent; outline: none; padding: 2px 0; margin-bottom: 4px; width: 100%; }
.editable-input:focus { border-bottom-color: var(--verde); }
.edit-icon { width: 14px; height: 14px; stroke: var(--muted); margin-left: 4px; vertical-align: middle; cursor: pointer; }
.info-row { font-size: 13px; color: var(--texto); margin-bottom: 4px; line-height: 1.5; }
.info-row .lbl { font-weight: 700; margin-right: 4px; }
.card { background: var(--branco); border-radius: 14px; border: 1px solid var(--borda); padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 700; color: var(--verde-card); margin-bottom: 10px; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.tag { background: #e8f0df; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--verde-card); }
.sobre-textarea { width: 100%; font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--texto); line-height: 1.6; border: none; outline: none; resize: none; background: transparent; padding: 0; min-height: 70px; }
.avaliacao { background: var(--branco); border-radius: 14px; border: 1px solid var(--borda); padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
.avaliacao .star { font-size: 20px; }
.avaliacao span { font-size: 14px; font-weight: 500; color: var(--texto); }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.card-mini { background: var(--branco); border-radius: 14px; border: 1px solid var(--borda); padding: 12px 14px; }
.card-mini-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--verde-card); margin-bottom: 8px; }
.card-mini-title .card-icon { width: 20px; height: 20px; stroke: var(--verde-card); stroke-width: 1.8; fill: none; }
.btn-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; padding: 16px 32px 32px; background: linear-gradient(to top, var(--bg) 65%, transparent); z-index: 20; }
.btn-salvar { width: 100%; background: var(--verde-btn); color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 14px; padding: 14px; cursor: pointer; }
.btn-salvar:active { transform: scale(0.98); }
#avatar-input { display: none; }
/* Menu lateral */
.menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 100; opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s; }
.menu-drawer { position: absolute; top: 0; right: 0; width: min(280px,85%); min-width:260px; height:100%; background: var(--branco); box-shadow: -8px 0 24px rgba(0,0,0,0.15); z-index:101; transform:translateX(100%); transition:transform 0.3s; overflow-y:auto; border-radius:20px 0 0 20px; }
.menu-overlay.open { opacity:1; visibility:visible; }
.menu-overlay.open .menu-drawer { transform:translateX(0); }
.menu-header { padding:28px 20px 20px; background:linear-gradient(135deg,#3a5f1e,#2d5016); color:white; border-bottom:1px solid rgba(255,255,255,0.2); }
.menu-user { display:flex; align-items:center; gap:12px; }
.menu-avatar { width:52px; height:52px; background:linear-gradient(145deg,#d48f3b,#b56a1a); border-radius:50%; display:flex; align-items:center; justify-content:center; }
.menu-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.menu-avatar svg { width: 30px; height: 30px; stroke: white; stroke-width: 1.8; fill: none; }
.menu-user-info h4 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.menu-user-info p { font-size: 12px; opacity: 0.85; display: flex; align-items: center; gap: 6px; }
.menu-user-info p svg { width: 14px; height: 14px; stroke: white; stroke-width: 2; }
.menu-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.2); border:none; width:36px; height:36px; border-radius:50%; cursor:pointer; }
.menu-close svg { width:20px; height:20px; stroke:white; stroke-width:2; }
.menu-nav { padding:12px 0 20px; }
.menu-item { display:flex; align-items:center; gap:14px; padding:12px 20px; font-size:15px; font-weight:500; color:var(--texto); cursor:pointer; }
.menu-item:hover { background:#f0ede7; }
.menu-item .menu-icon { width:26px; display:flex; align-items:center; justify-content:center; }
.menu-item .menu-icon svg { width:22px; height:22px; stroke:currentColor; stroke-width:1.8; fill:none; }
.menu-item .menu-text { flex:1; }
.divider { height:1px; background:var(--borda); margin:8px 16px; }
.section-title { font-size:13px; font-weight:600; color:#888; letter-spacing:0.5px; padding:12px 20px 4px; text-transform:uppercase; }
.footer-menu { border-top:1px solid var(--borda); margin-top:8px; padding:8px 0; }
@media (max-width: 400px) { 
  .header-content { padding: 52px 16px 14px; } 
  .btn-icon { width: 40px; height: 40px; } 
  .btn-icon svg { width: 22px; height: 22px; } 
  .logo-wrap img { height: 36px; } 
  .title-bar { padding: 12px 16px; } 
  .title-bar h1 { font-size: 16px; } 
  .perfil-hero { padding-top: 20px; padding-bottom: 35px; } 
  .avatar-wrap { width: 80px; height: 80px; } 
  .edit-photo-icon { width: 26px; height: 26px; bottom: -5px; right: -5px; } 
  .edit-photo-icon svg { width: 14px; height: 14px; } 
  .body { padding: 0 12px 100px; } 
  .card { padding: 12px 14px; } 
  .card-grid { gap: 8px; } 
  .btn-footer { padding: 12px 20px 28px; } 
  .btn-salvar { font-size: 14px; padding: 12px; } 
}
@media (max-width: 340px) { 
  .card-title { font-size: 14px; } 
  .info-row { font-size: 12px; } 
  .sobre-textarea { font-size: 12px; } 
  .avaliacao span { font-size: 13px; } 
  .btn-salvar { font-size: 13px; padding: 10px; } 
}
</style>
</head>
<body>
<div class="frame">
  <div class="header">
    <div class="header-bg"></div>
    <div class="header-content">
      <button class="btn-icon" id="backButton"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="logo-wrap"><img alt="PlanoV"></div>
      <button class="btn-icon" id="menuButton"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
  </div>
  <div class="title-bar"><h1>Meu Perfil</h1></div>
  <div class="perfil-hero">
    <label for="avatar-input" style="cursor:pointer">
      <div class="avatar-wrap" id="avatar-wrap">
        <div class="avatar-inner">
          <div class="avatar-placeholder">
            <svg viewBox="0 0 60 60">
              <circle cx="30" cy="20" r="12" fill="#f5d59a"/>
              <path d="M10 52c0-11 9-18 20-18s20 7 20 18" fill="#4a7c28"/>
              <ellipse cx="30" cy="10" rx="14" ry="4" fill="#8B5E14"/>
              <rect x="16" y="6" width="28" height="6" rx="3" fill="#a06820"/>
            </svg>
          </div>
          <img id="avatar-img" src="" style="display:none;">
        </div>
        <div class="edit-photo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </div>
      </div>
    </label>
    <input type="file" id="avatar-input" accept="image/*">
    <div class="badge-prestador" id="tipo-badge">Prestador</div>
  </div>
  <div class="body">
    <div class="perfil-nome" style="text-align: center; padding: 12px 0 4px;">
      <div style="display: flex; align-items: center; justify-content: center; gap: 6px;">
        <input class="editable-input" id="nome" placeholder="Nome" style="font-size: 20px; font-weight: 700; text-align: center; width: auto;">
        <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>
      </div>
      <div style="display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px;">
        <input class="editable-input" id="especialidade" placeholder="Especialidade / Cargo" style="font-size: 13px; color: #888; text-align: center;">
        <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>
      </div>
      <div style="display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px;">
        <input class="editable-input" id="cidade" placeholder="Cidade - UF" style="font-size: 13px; color: #888; text-align: center;">
        <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>
      </div>
    </div>

    <!-- CAMPOS PRESTADOR -->
    <div id="campos-prestador" style="display: none;">
      <div class="card">
        <div class="card-title">Informações Profissionais</div>
        <div class="info-row">
          <span class="lbl">Serviços:</span>
          <input class="editable-input" id="servicos" style="margin-left:8px; width:auto; display:inline-block;">
          <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; width: 14px; height: 14px;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>
        </div>
        <div class="info-row">
          <span class="lbl">Experiência:</span>
          <input class="editable-input" id="experiencia" style="margin-left:8px; width:auto; display:inline-block;">
          <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; width: 14px; height: 14px;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg>
        </div>
      </div>
      <div class="card-grid">
        <div class="card-mini">
          <div class="card-mini-title"><svg class="card-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="8" rx="2"/><rect x="7" y="5" width="10" height="6" rx="1"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><line x1="5" y1="11" x2="5" y2="9"/><line x1="19" y1="11" x2="19" y2="9"/></svg><span>Máquinas</span><svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px; margin-left: auto;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg></div>
          <textarea class="sobre-textarea" id="maquinas" rows="2"></textarea>
        </div>
        <div class="card-mini">
          <div class="card-mini-title"><svg class="card-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>Contato</span><svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px; margin-left: auto;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg></div>
          <textarea class="sobre-textarea" id="contato" rows="2"></textarea>
        </div>
      </div>
    </div>

    <!-- CAMPOS EMPRESA -->
    <div id="campos-empresa" style="display: none;">
      <div class="card">
        <div class="card-title">Informações gerais</div>
        <div class="info-row"><span class="lbl">Nome:</span><span id="empresa-nome-display"></span></div>
        <div class="info-row"><span class="lbl">Tipo:</span><input class="editable-input" id="tipo-empresa" placeholder="Agronegócio" style="margin-left:8px;"><svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg></div>
        <div class="info-row"><span class="lbl">Cultivo:</span><input class="editable-input" id="cultivo" placeholder="Ex: Soja, Milho" style="margin-left:8px;"><svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg></div>
        <div class="info-row"><span class="lbl">Região:</span><input class="editable-input" id="regiao" placeholder="Ex: Araras - SP" style="margin-left:8px;"><svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg></div>
      </div>
      <div class="card">
        <div class="card-title">Serviços que contrata</div>
        <div class="tags-wrap" id="servicos-tags-empresa"></div>
        <button type="button" id="add-servico-btn" style="margin-top:8px; background:none; border:1px dashed var(--verde-card); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--verde-card); cursor:pointer;">+ Adicionar serviço</button>
      </div>
    </div>

    <!-- SOBRE -->
    <div class="card">
      <div class="card-title" style="color: var(--laranja);">Sobre</div>
      <textarea class="sobre-textarea" id="sobre" rows="3"></textarea>
      <div style="text-align:right; margin-top:4px;"><svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg></div>
    </div>

    <!-- AVALIAÇÃO MÉDIA E LISTA DE AVALIAÇÕES -->
    <div class="avaliacao" id="avaliacao-container">
      <span class="star">⭐</span>
      <span id="nota-texto">Carregando...</span>
    </div>
    <div id="minhas-avaliacoes-container" style="margin-top: 12px;"></div>
  </div>

  <div class="btn-footer">
    <button class="btn-salvar" id="btnSalvar">Salvar alterações</button>
  </div>

  <!-- MENU DRAWER -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-drawer">
      <button class="menu-close" id="closeMenuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="menu-header">
        <div class="menu-user">
          <div class="menu-avatar" id="menuAvatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M12 2v4M12 6c-2.5 0-4 2-4 4h8c0-2-1.5-4-4-4z"/><path d="M12 10v10M8 20h8"/><path d="M5 18c1.5-1 3-1.5 5-1.5"/><path d="M19 18c-1.5-1-3-1.5-5-1.5"/></svg></div>
          <div class="menu-user-info"><h4 id="menuNome">Carregando...</h4><p><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3v6c0 2.5-2 4-4 4"/><path d="M12 9c2 0 4 1.5 4 4"/><path d="M6 21c2-2 4-3 6-3s4 1 6 3"/></svg><span id="menuTipo">Usuário</span></p></div>
        </div>
      </div>
      <div class="menu-nav">
        <div class="menu-item" data-nav="inicio"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="menu-text">Início</div></div>
        <div class="menu-item" data-nav="empresas"><div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><div class="menu-text">Empresas</div></div>
        <div class="menu-item" data-nav="agenda"><div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="15" r="1"/><circle cx="16" cy="15" r="1"/><circle cx="8" cy="15" r="1"/></svg></div><div class="menu-text">Minha Agenda</div></div>
        <div class="divider"></div>
        <div class="section-title">CONFIGURAÇÕES</div>
        <div class="menu-item" data-nav="perfil"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="menu-text">Meu Perfil</div></div>
        <div class="menu-item" data-nav="configuracoes"><div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><div class="menu-text">Configurações</div></div>
        <div class="menu-item" data-nav="ajuda"><div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="menu-text">Ajuda</div></div>
        <div class="divider"></div>
        <div class="footer-menu"><div class="menu-item" data-nav="sair"><div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div><div class="menu-text">Sair</div></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE_URL = 'http://localhost:3000/api';
  let token = localStorage.getItem('token');
  let currentUser = JSON.parse(localStorage.getItem('user') || '{}');

  if (!token || !currentUser.id) {
    alert('Você precisa estar logado para acessar esta página.');
    window.location.href = 'login.html';
  }

  // ========== ELEMENTOS ==========
  const nomeInput = document.getElementById('nome');
  const especialidadeInput = document.getElementById('especialidade');
  const cidadeInput = document.getElementById('cidade');
  const sobreTextarea = document.getElementById('sobre');
  const tipoBadge = document.getElementById('tipo-badge');
  const btnSalvar = document.getElementById('btnSalvar');
  const avatarImg = document.getElementById('avatar-img');
  const avatarPlaceholder = document.querySelector('.avatar-placeholder');
  let currentAvatarBase64 = null;

  // Prestador
  const servicosInput = document.getElementById('servicos');  // input simples
  const experienciaInput = document.getElementById('experiencia');
  const maquinasTextarea = document.getElementById('maquinas');
  const contatoTextarea = document.getElementById('contato');

  // Empresa
  const camposEmpresaDiv = document.getElementById('campos-empresa');
  const empresaNomeDisplay = document.getElementById('empresa-nome-display');
  const tipoEmpresaInput = document.getElementById('tipo-empresa');
  const cultivoInput = document.getElementById('cultivo');
  const regiaoInput = document.getElementById('regiao');
  const servicosTagsContainerEmpresa = document.getElementById('servicos-tags-empresa');
  let servicosEmpresaList = [];

  // Menu
  const menuNome = document.getElementById('menuNome');
  const menuTipo = document.getElementById('menuTipo');
  const menuAvatarDiv = document.getElementById('menuAvatar');

  // Avaliação
  const notaTextoSpan = document.getElementById('nota-texto');
  const minhasAvaliacoesContainer = document.getElementById('minhas-avaliacoes-container');

  // ========== FUNÇÕES AUXILIARES ==========
  function atualizarMenuBasico() {
    menuNome.innerText = `${currentUser.nome} ${currentUser.sobrenome || ''}`.trim();
    if (currentUser.tipo_usuario === 'prestador') menuTipo.innerText = 'Prestador';
    else if (currentUser.tipo_usuario === 'empresa') menuTipo.innerText = 'Empresa';
    else menuTipo.innerText = 'Usuário';
  }

  function configurarCamposPorTipo() {
    const camposPrestadorDiv = document.getElementById('campos-prestador');
    if (currentUser.tipo_usuario === 'prestador') {
      tipoBadge.innerText = 'Prestador';
      camposPrestadorDiv.style.display = 'block';
      camposEmpresaDiv.style.display = 'none';
    } else if (currentUser.tipo_usuario === 'empresa') {
      tipoBadge.innerText = 'Empresa';
      camposPrestadorDiv.style.display = 'none';
      camposEmpresaDiv.style.display = 'block';
    } else {
      tipoBadge.innerText = 'Produtor Rural';
      camposPrestadorDiv.style.display = 'none';
      camposEmpresaDiv.style.display = 'none';
    }
  }

  function renderServicosEmpresaTags() {
    servicosTagsContainerEmpresa.innerHTML = '';
    servicosEmpresaList.forEach(serv => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${serv} <span class="remove-tag-empresa" data-serv="${serv}" style="cursor:pointer; margin-left:6px;">✕</span>`;
      servicosTagsContainerEmpresa.appendChild(tag);
    });
    document.querySelectorAll('.remove-tag-empresa').forEach(el => {
      el.addEventListener('click', (e) => {
        const serv = el.getAttribute('data-serv');
        servicosEmpresaList = servicosEmpresaList.filter(s => s !== serv);
        renderServicosEmpresaTags();
      });
    });
  }

  async function carregarAvaliacoes() {
    try {
      const response = await fetch(`${API_BASE_URL}/reviews/${currentUser.id}`);
      if (response.ok) {
        const data = await response.json();
        const media = data.media ? parseFloat(data.media) : 0;
        const total = data.total || 0;
        if (media > 0) {
          notaTextoSpan.innerText = `${media.toFixed(1)} avaliação média (${total} avaliações)`;
        } else {
          notaTextoSpan.innerText = 'Nenhuma avaliação ainda';
        }
        minhasAvaliacoesContainer.innerHTML = '';
        if (data.reviews && data.reviews.length > 0) {
          data.reviews.forEach(rev => {
            const starsHtml = Array(5).fill(0).map((_, i) => i < rev.nota ? '★' : '☆').join('');
            const card = document.createElement('div');
            card.className = 'review-card';
            card.style.cssText = 'background:white; border-radius:14px; border:1px solid #e0ddd6; padding:12px; margin-bottom:10px;';
            card.innerHTML = `
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <div style="width:36px;height:36px;background:#ddd;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="#aaa"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                </div>
                <div><strong>${escapeHtml(rev.avaliador.nome)}</strong></div>
              </div>
              <div style="margin-bottom:6px;">${starsHtml}</div>
              <p style="font-size:12px;">${escapeHtml(rev.comentario || '')}</p>
            `;
            minhasAvaliacoesContainer.appendChild(card);
          });
        } else {
          minhasAvaliacoesContainer.innerHTML = '<p style="text-align:center; color:#888;">Nenhuma avaliação ainda.</p>';
        }
      } else {
        notaTextoSpan.innerText = 'Nenhuma avaliação ainda';
        minhasAvaliacoesContainer.innerHTML = '<p style="text-align:center; color:#888;">Nenhuma avaliação ainda.</p>';
      }
    } catch (err) {
      console.error(err);
      notaTextoSpan.innerText = 'Erro ao carregar avaliações';
    }
  }

  async function carregarPerfil() {
    try {
      const response = await fetch(`${API_BASE_URL}/profile/${currentUser.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) throw new Error('Erro ao carregar perfil');
      const data = await response.json();
      const userData = data.user;

      nomeInput.value = userData.nome || '';
      especialidadeInput.value = userData.especialidade || '';
      let cidadeTexto = userData.cidade || '';
      if (userData.estado) cidadeTexto += (cidadeTexto ? ` - ${userData.estado}` : userData.estado);
      cidadeInput.value = cidadeTexto;
      sobreTextarea.value = userData.sobre || '';

      if (userData.foto_perfil && userData.foto_perfil.startsWith('data:image')) {
        avatarImg.src = userData.foto_perfil;
        avatarImg.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
        currentAvatarBase64 = userData.foto_perfil;
        currentUser.foto_perfil = userData.foto_perfil;
        localStorage.setItem('user', JSON.stringify(currentUser));
        menuAvatarDiv.innerHTML = `<img src="${userData.foto_perfil}" style="width:100%;height:100%;object-fit:cover; border-radius:50%;">`;
      } else {
        avatarImg.style.display = 'none';
        avatarPlaceholder.style.display = 'flex';
        currentAvatarBase64 = null;
      }

      if (currentUser.tipo_usuario === 'prestador') {
        servicosInput.value = userData.servicos || '';
        experienciaInput.value = userData.experiencia || '';
        maquinasTextarea.value = userData.maquinas || '';
        contatoTextarea.value = userData.whatsapp ? `WhatsApp: ${userData.whatsapp}` : '';
      } else if (currentUser.tipo_usuario === 'empresa') {
        empresaNomeDisplay.innerText = userData.nome || '';
        tipoEmpresaInput.value = userData.nicho || 'Agronegócio';
        cultivoInput.value = userData.cultivo || '';
        regiaoInput.value = userData.regiao || '';
        if (userData.servicos_contrata) {
          try {
            servicosEmpresaList = JSON.parse(userData.servicos_contrata);
          } catch(e) {
            servicosEmpresaList = userData.servicos_contrata.split(',').map(s => s.trim());
          }
        } else {
          servicosEmpresaList = [];
        }
        renderServicosEmpresaTags();
      }
    } catch (err) {
      console.error(err);
      alert('Erro ao carregar perfil.');
    }
  }

  async function salvarPerfil() {
    const nome = nomeInput.value.trim();
    const sobrenome = currentUser.sobrenome || '';
    const endereco = '';
    let cidade = '';
    let estado = '';
    const cidadeRaw = cidadeInput.value.trim();
    if (cidadeRaw.includes('-')) {
      const parts = cidadeRaw.split('-');
      cidade = parts[0].trim();
      estado = parts[1].trim();
    } else {
      cidade = cidadeRaw;
      estado = '';
    }
    const sobre = sobreTextarea.value.trim();
    const especialidade = especialidadeInput.value.trim();

    const payload = {
      nome, sobrenome, endereco, cidade, estado, sobre, especialidade,
      foto_perfil: currentAvatarBase64 || null
    };

    if (currentUser.tipo_usuario === 'prestador') {
      payload.servicos = servicosInput.value.trim();
      payload.experiencia = experienciaInput.value.trim();
      const whatsapp = contatoTextarea.value.trim().replace(/^WhatsApp: /i, '');
      payload.whatsapp = whatsapp;
      payload.maquinas = maquinasTextarea.value.trim();
    } else if (currentUser.tipo_usuario === 'empresa') {
      payload.nicho = tipoEmpresaInput.value.trim();
      payload.cultivo = cultivoInput.value.trim();
      payload.regiao = regiaoInput.value.trim();
      payload.servicos_contrata = JSON.stringify(servicosEmpresaList);
    }

    console.log('Enviando payload:', payload);

    try {
      const response = await fetch(`${API_BASE_URL}/profile`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Erro ao salvar');
      }
      alert('Perfil atualizado com sucesso!');
      currentUser.nome = nome;
      currentUser.sobrenome = sobrenome;
      if (currentAvatarBase64) currentUser.foto_perfil = currentAvatarBase64;
      localStorage.setItem('user', JSON.stringify(currentUser));
      atualizarMenuBasico();
      await carregarPerfil();
      carregarAvaliacoes();
    } catch (err) {
      console.error(err);
      alert(err.message);
    }
  }

  // Adicionar serviço (empresa)
  document.getElementById('add-servico-btn')?.addEventListener('click', () => {
    const novoServico = prompt('Digite o serviço que contrata (ex: Colheita, Pulverização):');
    if (novoServico && novoServico.trim()) {
      servicosEmpresaList.push(novoServico.trim());
      renderServicosEmpresaTags();
    }
  });

  document.getElementById('avatar-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      currentAvatarBase64 = ev.target.result;
      avatarImg.src = currentAvatarBase64;
      avatarImg.style.display = 'block';
      avatarPlaceholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }

  // ========== INICIALIZAÇÃO ==========
  configurarCamposPorTipo();
  atualizarMenuBasico();
  carregarPerfil();
  carregarAvaliacoes();
  btnSalvar.addEventListener('click', salvarPerfil);

  // ========== MENU LATERAL ==========
  const menuOverlay = document.getElementById('menuOverlay');
  const menuBtn = document.getElementById('menuButton');
  const closeMenuBtn = document.getElementById('closeMenuBtn');
  const backButton = document.getElementById('backButton');
  function openMenu() { menuOverlay.classList.add('open'); }
  function closeMenu() { menuOverlay.classList.remove('open'); }
  if (menuBtn) menuBtn.addEventListener('click', openMenu);
  if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenu);
  if (menuOverlay) menuOverlay.addEventListener('click', (e) => { if (e.target === menuOverlay) closeMenu(); });
  if (backButton) backButton.addEventListener('click', () => window.history.back());
  document.querySelectorAll('.menu-item[data-nav]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const nav = item.getAttribute('data-nav');
      if (nav === 'sair') {
        if (confirm('Deseja realmente sair da sua conta?')) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.href = 'login.html';
        }
        closeMenu();
      } else if (nav === 'inicio') window.location.href = 'home.html';
      else if (nav === 'empresas') window.location.href = (currentUser.tipo_usuario === 'prestador') ? 'buscar-empresas.html' : 'buscar-prestadores.html';
      else if (nav === 'agenda') window.location.href = 'agenda.html';
      else if (nav === 'perfil') closeMenu();
      else if (nav === 'configuracoes') alert('Configurações em breve');
      else if (nav === 'ajuda') alert('Central de ajuda em breve');
      else closeMenu();
    });
  });
</script>
</body>
</html>
